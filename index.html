<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>My Korean Skincare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════════
       DESIGN TOKENS — Aesu brand palette
       ═══════════════════════════════════════════════════════ */
    :root {
      /* Pearl whites & soft tints */
      --pure-pearl:      #FDFCFA;
      --warm-white:      #F8F4EF;
      --ivory-mist:      #F4EDE6;
      --porcelain:       #EFE8E0;
      --cream-silk:      #EAE0D8;

      /* Backgrounds & neutrals */
      --warm-linen:      #F5EFE8;
      --soft-blush-beige:#EDE6DF;
      --dusty-rose-white:#E8DDD4;
      --greige-mist:     #DED6CE;
      --pebble-sand:     #D4CBC2;

      /* Terracotta & spice accents */
      --true-terracotta: #C45C3A;
      --deep-clay:       #A64830;
      --spiced-amber:    #D4825A;
      --warm-sand:       #E8AA88;
      --dune-blush:      #F0CDB0;

      /* Product & accent tones */
      --warm-caramel:    #C4A882;
      --honey-amber:     #B89A7A;
      --apricot-nude:    #D4B8A0;
      --peach-blush:     #E8C4B0;
      --soft-coral-mist: #F0D0B8;

      /* Typography & dark tones */
      --espresso-black:  #3A3530;
      --dark-mocha:      #6B5E52;
      --warm-taupe:      #8A7A6E;
      --stone-grey:      #B8A898;
      --silver-sand:     #D4C8BC;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: none; }
    body { background: var(--warm-linen); overflow-x: hidden; }
    input[type=file] { display: none; }

    /* ── Loading screen ───────────────────────────────────── */
    .sk-init         { display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:18px;background:var(--warm-linen); }
    .sk-init-logo    { font-family:'Cormorant Garamond',Georgia,serif;font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--true-terracotta);margin-bottom:4px; }
    .sk-init-title   { font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;font-weight:500;color:var(--espresso-black);letter-spacing:.02em; }
    .sk-init-sub     { font-size:11px;color:var(--warm-taupe);letter-spacing:.12em;text-transform:uppercase; }
    .sk-spin-sm      { width:28px;height:28px;border:2px solid var(--cream-silk);border-top-color:var(--true-terracotta);border-radius:50%;animation:sk-rot .75s linear infinite; }
    @keyframes sk-rot { to { transform:rotate(360deg); } }

    /* ── App shell ─────────────────────────────────────────── */
    .sk-app          { font-family:'Nunito',system-ui,sans-serif;background:var(--warm-linen);height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;color:var(--espresso-black);overflow:hidden; }
    .sk-header       { background:var(--pure-pearl);padding:22px 22px 0;border-bottom:1px solid var(--cream-silk);flex-shrink:0; }
    .sk-eyebrow      { font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--true-terracotta);font-weight:600;margin-bottom:5px; }
    .sk-title        { font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;font-weight:500;letter-spacing:.02em;line-height:1.1;color:var(--espresso-black); }
    .sk-tabs         { display:flex;margin-top:18px; }
    .sk-tab          { flex:1;padding:10px 6px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--stone-grey);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s; }
    .sk-tab.on       { color:var(--true-terracotta);border-bottom-color:var(--true-terracotta); }
    .sk-content      { flex:1;overflow-y:auto;padding:22px 22px 52px;scrollbar-width:none; }
    .sk-content::-webkit-scrollbar { display:none; }
    .sk-chat-wrap    { flex:1;display:flex;flex-direction:column;overflow:hidden; }

    /* ── Layout helpers ────────────────────────────────────── */
    .row             { display:flex;align-items:center;justify-content:space-between;margin-bottom:20px; }
    .sec-title       { font-family:'Cormorant Garamond',Georgia,serif;font-size:21px;font-weight:500;color:var(--espresso-black); }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn-primary     { background:var(--true-terracotta);color:var(--pure-pearl);border:none;padding:9px 20px;border-radius:24px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .2s,transform .15s;letter-spacing:.01em; }
    .btn-primary:hover  { background:var(--deep-clay);transform:translateY(-1px); }
    .btn-primary:active { transform:translateY(0); }
    .btn-outline     { background:none;color:var(--true-terracotta);border:1.5px solid var(--true-terracotta);padding:7px 16px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.01em; }
    .btn-outline:hover  { background:var(--true-terracotta);color:var(--pure-pearl); }
    .btn-danger      { color:var(--deep-clay)!important;border-color:var(--deep-clay)!important; }
    .btn-danger:hover   { background:var(--deep-clay)!important;color:var(--pure-pearl)!important; }
    .btn-ghost       { background:none;border:none;cursor:pointer;color:var(--pebble-sand);font-size:18px;padding:4px;line-height:1;transition:color .2s; }
    .btn-ghost:hover { color:var(--true-terracotta); }
    .back-btn        { background:none;border:none;font-size:22px;cursor:pointer;color:var(--true-terracotta);padding:0;line-height:1;flex-shrink:0; }

    /* ── Add circle on product card ────────────────────────── */
    .add-circ        { width:28px;height:28px;border-radius:50%;background:var(--true-terracotta);color:var(--pure-pearl);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .15s;line-height:1; }
    .add-circ:hover  { background:var(--deep-clay);transform:scale(1.12); }

    /* ── Badges ────────────────────────────────────────────── */
    .badge           { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:600;letter-spacing:.03em;white-space:nowrap; }

    /* ── Filter chips ──────────────────────────────────────── */
    .chips           { display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:16px;scrollbar-width:none; }
    .chips::-webkit-scrollbar { display:none; }
    .chip            { white-space:nowrap;padding:6px 15px;border-radius:22px;border:1.5px solid var(--silver-sand);background:var(--pure-pearl);font-size:12px;font-weight:500;color:var(--warm-taupe);cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;flex-shrink:0; }
    .chip.on         { background:var(--espresso-black);border-color:var(--espresso-black);color:var(--pure-pearl); }

    /* ── Product grid ──────────────────────────────────────── */
    .p-grid          { display:grid;grid-template-columns:1fr 1fr;gap:14px; }
    .p-card          { background:var(--pure-pearl);border-radius:18px;overflow:hidden;border:1px solid var(--ivory-mist);cursor:pointer;transition:transform .2s,box-shadow .2s; }
    .p-card:hover    { transform:translateY(-3px);box-shadow:0 8px 24px rgba(58,53,48,.10); }
    .p-photo         { width:100%;aspect-ratio:1;overflow:hidden;background:linear-gradient(135deg,var(--ivory-mist),var(--soft-blush-beige));display:flex;align-items:center;justify-content:center;font-size:40px; }
    .p-photo img     { width:100%;height:100%;object-fit:cover; }
    .p-body          { padding:10px 13px 13px; }
    .p-brand         { font-size:10px;color:var(--true-terracotta);font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px; }
    .p-name          { font-size:13px;font-weight:600;color:var(--espresso-black);margin-bottom:9px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .p-foot          { display:flex;align-items:center;justify-content:space-between;gap:4px; }

    /* ── Empty states ──────────────────────────────────────── */
    .empty           { text-align:center;padding:56px 24px;color:var(--stone-grey); }
    .empty-ico       { font-size:48px;margin-bottom:16px; }
    .empty-t         { font-family:'Cormorant Garamond',Georgia,serif;font-size:21px;font-style:italic;color:var(--warm-taupe);margin-bottom:10px;font-weight:400; }
    .empty-d         { font-size:13px;line-height:1.7;color:var(--warm-taupe); }

    /* ── Modals / Bottom sheets ────────────────────────────── */
    .overlay         { position:fixed;inset:0;background:rgba(58,53,48,.52);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(8px); }
    .sheet           { background:var(--pure-pearl);border-radius:26px 26px 0 0;width:100%;max-height:92dvh;overflow-y:auto;animation:slideUp .28s ease;scrollbar-width:none;border-top:1px solid var(--ivory-mist); }
    .sheet::-webkit-scrollbar { display:none; }
    .handle          { width:36px;height:4px;background:var(--cream-silk);border-radius:2px;margin:14px auto 22px; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sheet-pad       { padding:0 24px 36px; }
    .m-title         { font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:500;margin-bottom:20px;color:var(--espresso-black); }

    /* ── Add product options ───────────────────────────────── */
    .add-opts        { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px; }
    .add-opt         { border:1.5px dashed var(--pebble-sand);border-radius:18px;padding:28px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .2s;background:var(--warm-linen);font-family:'Nunito',sans-serif; }
    .add-opt:hover   { border-color:var(--true-terracotta);background:var(--ivory-mist); }
    .add-opt-ico     { font-size:32px; }
    .add-opt-lbl     { font-size:13px;font-weight:600;color:var(--dark-mocha);text-align:center; }

    /* ── Product detail sheet ──────────────────────────────── */
    .det-photo       { width:100%;height:230px;overflow:hidden;background:linear-gradient(135deg,var(--ivory-mist),var(--soft-blush-beige));display:flex;align-items:center;justify-content:center;font-size:72px;border-radius:26px 26px 0 0; }
    .det-photo img   { width:100%;height:100%;object-fit:cover; }
    .det-brand       { font-size:10px;color:var(--true-terracotta);letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:4px; }
    .det-name        { font-family:'Cormorant Garamond',Georgia,serif;font-size:26px;font-weight:500;margin-bottom:14px;line-height:1.2;color:var(--espresso-black); }
    .sec-lbl         { font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--stone-grey);margin-bottom:7px;margin-top:20px;display:block; }
    .sec-txt         { font-size:13px;line-height:1.7;color:var(--dark-mocha); }
    .tags            { display:flex;flex-wrap:wrap;gap:6px; }
    .tag             { padding:4px 13px;border-radius:16px;background:var(--ivory-mist);color:var(--dark-mocha);font-size:12px;font-weight:500; }
    .tag.green       { background:var(--porcelain);color:var(--espresso-black); }

    /* ── Routines ──────────────────────────────────────────── */
    .r-card          { background:var(--pure-pearl);border-radius:18px;padding:18px 20px;margin-bottom:12px;border:1px solid var(--ivory-mist);cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;align-items:center;gap:14px; }
    .r-card:hover    { transform:translateY(-2px);box-shadow:0 6px 20px rgba(58,53,48,.08); }
    .r-em            { font-size:30px;flex-shrink:0; }
    .r-info          { flex:1; }
    .r-name          { font-family:'Cormorant Garamond',Georgia,serif;font-size:19px;font-weight:500;color:var(--espresso-black); }
    .r-cnt           { font-size:12px;color:var(--warm-taupe);margin-top:2px; }
    .r-arr           { color:var(--pebble-sand);font-size:22px; }
    .step-row        { display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--ivory-mist); }
    .step-num        { width:26px;height:26px;border-radius:50%;background:var(--ivory-mist);color:var(--true-terracotta);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .step-ph         { width:48px;height:48px;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,var(--ivory-mist),var(--soft-blush-beige));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0; }
    .step-ph img     { width:100%;height:100%;object-fit:cover; }

    /* ── Form inputs ───────────────────────────────────────── */
    .inp             { width:100%;border:1.5px solid var(--cream-silk);border-radius:12px;padding:10px 15px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--espresso-black);outline:none;background:var(--warm-white);transition:border-color .2s;margin-top:7px; }
    .inp:focus       { border-color:var(--true-terracotta); }
    .form-lbl        { font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--stone-grey);margin-top:18px;display:block; }
    .em-pick         { display:flex;flex-wrap:wrap;gap:8px;margin-top:9px; }
    .em-btn          { width:40px;height:40px;border-radius:11px;border:1.5px solid var(--cream-silk);background:var(--warm-white);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s; }
    .em-btn.on       { border-color:var(--true-terracotta);background:var(--dune-blush); }

    /* ── Product list in modals ────────────────────────────── */
    .p-list-row      { display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--ivory-mist);cursor:pointer;transition:background .15s;border-radius:4px; }
    .p-list-row:hover{ background:var(--warm-linen);margin:0 -24px;padding:12px 24px; }
    .p-list-ph       { width:40px;height:40px;border-radius:9px;overflow:hidden;background:var(--ivory-mist);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0; }
    .p-list-ph img   { width:100%;height:100%;object-fit:cover; }

    /* ── Chat ──────────────────────────────────────────────── */
    .chat-hdr        { display:flex;align-items:center;gap:14px;padding:18px 22px;background:var(--pure-pearl);border-bottom:1px solid var(--cream-silk);flex-shrink:0; }
    .aesu-av         { width:46px;height:46px;border-radius:50%;background:linear-gradient(145deg,var(--spiced-amber),var(--dune-blush));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:2px solid var(--warm-white); }
    .aesu-nm         { font-family:'Cormorant Garamond',Georgia,serif;font-size:19px;font-weight:500;color:var(--espresso-black); }
    .aesu-sub        { font-size:11px;color:var(--warm-taupe);margin-top:1px; }
    .aesu-dot        { display:inline-block;width:7px;height:7px;border-radius:50%;background:#7BAE7F;margin-right:5px;vertical-align:middle; }
    .msgs            { flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px;scrollbar-width:none; }
    .msgs::-webkit-scrollbar { display:none; }
    .msg             { display:flex;gap:10px;max-width:90%; }
    .msg.u           { margin-left:auto;flex-direction:row-reverse; }
    .av              { width:32px;height:32px;border-radius:50%;background:linear-gradient(145deg,var(--spiced-amber),var(--dune-blush));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0; }
    .msg.u .av       { background:linear-gradient(145deg,var(--warm-caramel),var(--honey-amber)); }
    .bubble          { padding:11px 15px;border-radius:18px;font-size:13.5px;line-height:1.6;background:var(--pure-pearl);border:1px solid var(--ivory-mist);border-bottom-left-radius:4px;white-space:pre-wrap;word-break:break-word;color:var(--espresso-black); }
    .msg.u .bubble   { background:var(--espresso-black);color:var(--warm-white);border:none;border-bottom-left-radius:18px;border-bottom-right-radius:4px; }
    .chat-inp-area   { padding:12px 16px 22px;background:var(--pure-pearl);border-top:1px solid var(--cream-silk);display:flex;gap:10px;align-items:flex-end;flex-shrink:0; }
    .chat-inp        { flex:1;border:1.5px solid var(--cream-silk);border-radius:22px;padding:10px 17px;font-family:'Nunito',sans-serif;font-size:13.5px;color:var(--espresso-black);outline:none;resize:none;max-height:100px;background:var(--warm-linen);transition:border-color .2s;line-height:1.5; }
    .chat-inp:focus  { border-color:var(--true-terracotta); }
    .chat-inp::placeholder { color:var(--stone-grey); }
    .chat-send           { width:40px;height:40px;border-radius:50%;background:var(--true-terracotta);border:none;color:var(--pure-pearl);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s; }
    .chat-send:hover     { background:var(--deep-clay); }
    .chat-send:disabled  { background:var(--pebble-sand);cursor:default; }
    .dots span           { display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--spiced-amber);margin:0 2px;animation:bop 1.1s infinite; }
    .dots span:nth-child(2) { animation-delay:.18s; }
    .dots span:nth-child(3) { animation-delay:.36s; }
    @keyframes bop { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }

    /* ── Full-screen overlays ──────────────────────────────── */
    .spin-over       { position:fixed;inset:0;background:rgba(58,53,48,.76);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:18px; }
    .spin            { width:48px;height:48px;border:3px solid rgba(253,252,250,.2);border-top-color:var(--pure-pearl);border-radius:50%;animation:sk-rot .75s linear infinite; }
    .spin-t          { color:var(--pure-pearl);font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;font-style:italic; }
    .spin-s          { color:rgba(253,252,250,.6);font-size:12px;letter-spacing:.03em; }

    /* ── Toast notification ────────────────────────────────── */
    .toast           { position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--espresso-black);color:var(--warm-white);padding:8px 20px;border-radius:22px;font-size:12px;font-weight:600;letter-spacing:.04em;z-index:400;opacity:0;transition:opacity .25s;white-space:nowrap; }
    .toast.show      { opacity:1; }
  </style>
</head>

      <div class="sk-spin-sm"></div>
      <div class="sk-init-title">My Korean Skincare</div>
      <div class="sk-init-sub">Loading your routine…</div>

  </div>

  <!-- CDN ─────────────────────────────────────────────────────────── -->

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Config ──────────────────────────────────────────────────────── -->
  <script>

    const SUPABASE_URL      = 'https://tclsndvassbosributcj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_IuaOUqFtitxNZEvbUn7SOw_kO3RkdMe';

    // ──────────────────────────────────────────────────────────────────────

      { id:6,  name:'Serum / Ampoule', emoji:'💎', bg:'#E8AA88', fg:'#A64830' },  // Warm Sand / Deep Clay

      { id:8,  name:'Eye Cream',       emoji:'🌙', bg:'#D4CBC2', fg:'#6B5E52' },  // Pebble Sand
      { id:9,  name:'Moisturizer',     emoji:'🧴', bg:'#F0CDB0', fg:'#A64830' },  // Dune Blush / Deep Clay
      { id:10, name:'Sunscreen',       emoji:'☀️', bg:'#D4825A', fg:'#FDFCFA' },  // Spiced Amber / Pure Pearl
    ];
    const ROUTINE_EMOJIS = ['🌅','🌙','🌿','💆','✨','🫧','💎','🌸','⭐','🍃','🔥','🫶'];
  </script>

  <!-- App ─────────────────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── Session ID (localStorage UUID → replace with Supabase Auth for multi-user) ─
    function getUserId() {
      let uid = localStorage.getItem('sk_uid');
      if (!uid) { uid = crypto.randomUUID(); localStorage.setItem('sk_uid', uid); }
      return uid;
    }
    const USER_ID = getUserId();

    // ── Image compression ──────────────────────────────────────────────────
    function compressImage(file, max = 600) {
      return new Promise(res => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          let { width: w, height: h } = img;
          if (w > max || h > max) {
            if (w > h) { h = Math.round(h / w * max); w = max; }
            else       { w = Math.round(w / h * max); h = max; }
          }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);
          res(c.toDataURL('image/jpeg', 0.75));
        };
        img.src = url;
      });
    }

    // ── Worker calls ──────────────────────────────────────────────────────
    async function callAnalyze(b64) {
      const r = await fetch(`${WORKER_URL}/analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ imageBase64: b64 }),
      });
      if (!r.ok) throw new Error(`Analyze failed: ${r.status}`);
      return r.json();
    }

    async function callChat(history, products) {
      const r = await fetch(`${WORKER_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history,
          products: products.map(p => ({ name: p.name, brand: p.brand, step_name: p.step_name })),
        }),
      });
      if (!r.ok) throw new Error(`Chat failed: ${r.status}`);
      const d = await r.json();
      return d.reply;
    }

    // ── Toast ──────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      let el = document.getElementById('sk-toast');
      if (!el) { el = document.createElement('div'); el.id = 'sk-toast'; el.className = 'toast'; document.body.appendChild(el); }
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    // ═════════════════════════════════════════════════════════════════════
    // App component
    // ═════════════════════════════════════════════════════════════════════
    function App() {
      const [loading, setLoading]               = useState(true);
      const [tab, setTab]                       = useState('products');
      const [products, setProducts]             = useState([]);
      const [routines, setRoutines]             = useState([]);
      const [messages, setMessages]             = useState([{
        role: 'assistant',
        content: 'I\'m Dear Aesu, your personal K-beauty Skincare Advisor.\n\nTell me about your skin concerns, your current routine, or anything K-beauty — I\'ll help you glow!',
      }]);
      const [filterStep, setFilterStep]         = useState(null);
      const [analyzing, setAnalyzing]           = useState(false);
      const [chatLoading, setChatLoading]       = useState(false);
      const [chatInput, setChatInput]           = useState('');
      const [showAddProd, setShowAddProd]       = useState(false);
      const [selProd, setSelProd]               = useState(null);
      const [selRoutine, setSelRoutine]         = useState(null);
      const [addToRtnProd, setAddToRtnProd]     = useState(null);
      const [showCreateRtn, setShowCreateRtn]   = useState(false);
      const [rtnName, setRtnName]               = useState('');
      const [rtnEmoji, setRtnEmoji]             = useState('✨');

      const fileRef = useRef();
      const camRef  = useRef();
      const chatEnd = useRef();

      // ── Load data ────────────────────────────────────────────────────────
      useEffect(() => {
        (async () => {
          try {
            const [{ data: prods, error: pErr }, { data: rtns, error: rErr }] = await Promise.all([
              db.from('products').select('*').eq('user_id', USER_ID).order('created_at'),
              db.from('routines').select('*').eq('user_id', USER_ID).order('created_at'),
            ]);
            if (pErr) throw pErr;
            if (rErr) throw rErr;
            setProducts(prods || []);
            if (!rtns || rtns.length === 0) {
              const { data: seeds, error: sErr } = await db.from('routines').insert([
                { user_id: USER_ID, name: 'AM Routine', emoji: '🌅', product_ids: [] },
                { user_id: USER_ID, name: 'PM Routine', emoji: '🌙', product_ids: [] },
              ]).select();
              if (sErr) throw sErr;
              setRoutines(seeds || []);
            } else {
              setRoutines(rtns);
            }
          } catch (e) {
            console.error('Load error:', e);
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      useEffect(() => {
        chatEnd.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, chatLoading]);

      // ── Handlers ────────────────────────────────────────────────────────
      async function handleFile(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        e.target.value = '';
        setShowAddProd(false);
        setAnalyzing(true);
        try {
          const dataUrl = await compressImage(file);
          const b64 = dataUrl.split(',')[1];
          const info = await callAnalyze(b64);
          const step = STEPS.find(s => s.id === Number(info.step_id)) || STEPS[0];
          const row = {
            user_id: USER_ID,
            name: info.name || 'Unknown Product',
            brand: info.brand || 'Unknown Brand',
            step_id: step.id,
            step_name: step.name,
            step_bg: step.bg,
            step_fg: step.fg,
            step_emoji: step.emoji,
            how_to_use: info.how_to_use || '',
            active_ingredients: Array.isArray(info.active_ingredients) ? info.active_ingredients : [],
            suitable_for: Array.isArray(info.suitable_for) ? info.suitable_for : [],
            photo: dataUrl,
          };
          const { data, error } = await db.from('products').insert(row).select().single();
          if (error) throw error;
          setProducts(prev => [...prev, data]);
          showToast('Product saved ✓');
        } catch (err) {
          console.error(err);
          alert('Could not analyze this product — please try again 🙏');
        } finally {
          setAnalyzing(false);
        }
      }

      async function sendChat() {
        if (!chatInput.trim() || chatLoading) return;
        const userMsg = { role: 'user', content: chatInput.trim() };
        const history = [...messages, userMsg];
        setMessages(history);
        setChatInput('');
        setChatLoading(true);
        try {
          const reply = await callChat(history, products);
          setMessages(h => [...h, { role: 'assistant', content: reply }]);
        } catch {
          setMessages(h => [...h, { role: 'assistant', content: 'Something went wrong — please try again 🙏' }]);
        } finally {
          setChatLoading(false);
        }
      }

      async function addToRoutine(routineId, productId) {
        const rtn = routines.find(r => r.id === routineId);
        if (!rtn || (rtn.product_ids || []).includes(productId)) { setAddToRtnProd(null); return; }
        const newIds = [...(rtn.product_ids || []), productId];
        setRoutines(rs => rs.map(r => r.id === routineId ? { ...r, product_ids: newIds } : r));
        setAddToRtnProd(null);
        await db.from('routines').update({ product_ids: newIds }).eq('id', routineId);
        showToast('Added to routine ✓');
      }

      async function removeFromRoutine(routineId, productId) {
        const rtn = routines.find(r => r.id === routineId);
        if (!rtn) return;
        const newIds = (rtn.product_ids || []).filter(id => id !== productId);
        setRoutines(rs => rs.map(r => r.id === routineId ? { ...r, product_ids: newIds } : r));
        await db.from('routines').update({ product_ids: newIds }).eq('id', routineId);
      }

      async function createRoutine() {
        if (!rtnName.trim()) return;
        const { data, error } = await db.from('routines').insert({
          user_id: USER_ID, name: rtnName.trim(), emoji: rtnEmoji, product_ids: [],
        }).select().single();
        if (error) { console.error(error); return; }
        setRoutines(rs => [...rs, data]);
        setRtnName(''); setRtnEmoji('✨'); setShowCreateRtn(false);
      }

      async function deleteProduct(id) {
        setProducts(ps => ps.filter(p => p.id !== id));
        setSelProd(null);
        const affected = routines.filter(r => (r.product_ids || []).includes(id));
        setRoutines(rs => rs.map(r => ({ ...r, product_ids: (r.product_ids || []).filter(pid => pid !== id) })));
        await db.from('products').delete().eq('id', id);
        for (const r of affected) {
          await db.from('routines').update({ product_ids: (r.product_ids || []).filter(pid => pid !== id) }).eq('id', r.id);
        }
      }

      function getRoutineProducts(rtn) {
        return (rtn.product_ids || [])
          .map(id => products.find(p => p.id === id))
          .filter(Boolean)
          .sort((a, b) => a.step_id - b.step_id);
      }

      const filtered = filterStep ? products.filter(p => p.step_id === filterStep) : products;

      // ── Tab: Products ────────────────────────────────────────────────────
      function renderProducts() {
        return (
          <>
            <div className="row">
              <h2 className="sec-title">
                My Products{' '}
                <span style={{fontFamily:'Nunito',fontSize:14,color:'var(--stone-grey)',fontWeight:400}}>({products.length})</span>
              </h2>
              <button className="btn-primary" onClick={() => setShowAddProd(true)}>＋ Add</button>
            </div>

            {products.length > 0 && (
              <div className="chips">
                <button className={`chip ${!filterStep ? 'on' : ''}`} onClick={() => setFilterStep(null)}>All</button>
                {STEPS.filter(s => products.some(p => p.step_id === s.id)).map(s => (
                  <button key={s.id} className={`chip ${filterStep === s.id ? 'on' : ''}`}
                    onClick={() => setFilterStep(filterStep === s.id ? null : s.id)}>
                    {s.emoji} {s.name}
                  </button>
                ))}
              </div>
            )}

            {filtered.length === 0 ? (
              <div className="empty">
                <div className="empty-ico">🧴</div>
                <div className="empty-t">No products yet</div>
                <div className="empty-d">Tap "Add" to photograph your first product —<br />Claude will identify it and fill in everything!</div>
              </div>
            ) : (
              <div className="p-grid">
                {filtered.map(p => (
                  <div className="p-card" key={p.id} onClick={() => setSelProd(p)}>
                    <div className="p-photo">
                      {p.photo ? <img src={p.photo} alt={p.name} /> : <span>{p.step_emoji}</span>}
                    </div>
                    <div className="p-body">
                      <div className="p-brand">{p.brand}</div>
                      <div className="p-name">{p.name}</div>
                      <div className="p-foot">
                        <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>
                          {p.step_emoji} {p.step_name}
                        </span>
                        <button className="add-circ" title="Add to routine"
                          onClick={e => { e.stopPropagation(); setAddToRtnProd(p); }}>＋</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </>
        );
      }

      // ── Tab: Routines ────────────────────────────────────────────────────
      function renderRoutines() {
        if (selRoutine) {
          const rtn = routines.find(r => r.id === selRoutine);
          if (!rtn) { setSelRoutine(null); return null; }
          const rps = getRoutineProducts(rtn);
          return (
            <>
              <div className="row">
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <button className="back-btn" onClick={() => setSelRoutine(null)}>←</button>
                  <h2 className="sec-title">{rtn.emoji} {rtn.name}</h2>
                </div>
                <button className="btn-outline" onClick={() => setAddToRtnProd({ _rtnId: rtn.id })}>＋ Step</button>
              </div>
              {rps.length === 0 ? (
                <div className="empty">
                  <div className="empty-ico">{rtn.emoji}</div>
                  <div className="empty-t">Routine is empty</div>
                  <div className="empty-d">Tap "＋ Step" or tap the ＋ on any product card.</div>
                </div>
              ) : rps.map(p => (
                <div className="step-row" key={p.id}>
                  <div className="step-num">{p.step_id}</div>
                  <div className="step-ph">
                    {p.photo ? <img src={p.photo} alt={p.name} /> : <span>{p.step_emoji}</span>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:10,color:'var(--true-terracotta)',fontWeight:600,letterSpacing:'.1em',textTransform:'uppercase',marginBottom:2}}>{p.brand}</div>
                    <div style={{fontSize:14,fontWeight:600,marginBottom:5,color:'var(--espresso-black)'}}>{p.name}</div>
                    <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>{p.step_emoji} {p.step_name}</span>
                  </div>
                  <button className="btn-ghost" onClick={() => removeFromRoutine(rtn.id, p.id)} title="Remove">✕</button>
                </div>
              ))}
            </>
          );
        }
        return (
          <>
            <div className="row">
              <h2 className="sec-title">My Routines</h2>
              <button className="btn-primary" onClick={() => setShowCreateRtn(true)}>＋ New</button>
            </div>
            {routines.length === 0 ? (
              <div className="empty">
                <div className="empty-ico">📋</div>
                <div className="empty-t">No routines yet</div>
                <div className="empty-d">Create your first routine — AM, PM, or anything you like!</div>
              </div>
            ) : routines.map(r => {
              const cnt = (r.product_ids || []).filter(id => products.find(p => p.id === id)).length;
              return (
                <div className="r-card" key={r.id} onClick={() => setSelRoutine(r.id)}>
                  <div className="r-em">{r.emoji}</div>
                  <div className="r-info">
                    <div className="r-name">{r.name}</div>
                    <div className="r-cnt">{cnt === 0 ? 'No products yet' : `${cnt} step${cnt !== 1 ? 's' : ''}`}</div>
                  </div>
                  <div className="r-arr">›</div>
                </div>
              );
            })}
          </>
        );
      }

      // ── Tab: Dear Aesu ───────────────────────────────────────────────────
      function renderAesu() {
        return (
          <div className="sk-chat-wrap">
            <div className="chat-hdr">
              <div className="aesu-av">🌸</div>
              <div>
                <div className="aesu-nm">Dear Aesu</div>
                <div className="aesu-sub"><span className="aesu-dot" />K-beauty advisor · always here</div>
              </div>
            </div>
            <div className="msgs">
              {messages.map((m, i) => (
                <div key={i} className={`msg ${m.role === 'user' ? 'u' : ''}`}>
                  <div className="av">{m.role === 'user' ? '🌿' : '🌸'}</div>
                  <div className="bubble">{m.content}</div>
                </div>
              ))}
              {chatLoading && (
                <div className="msg">
                  <div className="av">🌸</div>
                  <div className="bubble"><div className="dots"><span/><span/><span/></div></div>
                </div>
              )}
              <div ref={chatEnd} />
            </div>
            <div className="chat-inp-area">
              <textarea className="chat-inp" value={chatInput}
                onChange={e => setChatInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } }}
                placeholder="Ask Dear Aesu anything…" rows={1} />
              <button className="chat-send" onClick={sendChat} disabled={chatLoading || !chatInput.trim()}>↑</button>
            </div>
          </div>
        );
      }

      // ── Modal: Add product ───────────────────────────────────────────────
      function modalAddProduct() {
        return (
          <div className="overlay" onClick={() => setShowAddProd(false)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="sheet-pad">
                <div className="m-title">Add a Product</div>
                <div className="add-opts">
                  <div className="add-opt" onClick={() => camRef.current?.click()}>
                    <div className="add-opt-ico">📸</div>
                    <div className="add-opt-lbl">Take a Photo</div>
                  </div>
                  <div className="add-opt" onClick={() => fileRef.current?.click()}>
                    <div className="add-opt-ico">🖼️</div>
                    <div className="add-opt-lbl">Upload Image</div>
                  </div>
                </div>
                <p style={{marginTop:20,fontSize:12,color:'var(--warm-taupe)',textAlign:'center',lineHeight:1.7}}>
                  Claude will auto-detect the product name, K-beauty step,<br />key ingredients & how to use ✨
                </p>
              </div>
            </div>
          </div>
        );
      }

      // ── Modal: Product detail ────────────────────────────────────────────
      function modalProductDetail() {
        const p = selProd;
        return (
          <div className="overlay" onClick={() => setSelProd(null)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="det-photo">
                {p.photo ? <img src={p.photo} alt={p.name} /> : <span>{p.step_emoji}</span>}
              </div>
              <div className="sheet-pad" style={{paddingTop:22}}>
                <div className="det-brand">{p.brand}</div>
                <div className="det-name">{p.name}</div>
                <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>
                  Step {p.step_id} · {p.step_emoji} {p.step_name}
                </span>
                <span className="sec-lbl">How to Use</span>
                <div className="sec-txt">{p.how_to_use || '—'}</div>
                <span className="sec-lbl">Key Actives</span>
                <div className="tags">
                  {(p.active_ingredients || []).length
                    ? (p.active_ingredients || []).map((ing, i) => <span key={i} className="tag">{ing}</span>)
                    : <span className="tag">—</span>}
                </div>
                <span className="sec-lbl">Suitable For</span>
                <div className="tags">
                  {(p.suitable_for || []).length
                    ? (p.suitable_for || []).map((s, i) => <span key={i} className="tag green">{s}</span>)
                    : <span className="tag">—</span>}
                </div>
                <div style={{display:'flex',gap:10,marginTop:28,marginBottom:8}}>
                  <button className="btn-primary" style={{flex:1,justifyContent:'center'}}
                    onClick={() => { setAddToRtnProd(p); setSelProd(null); }}>
                    Add to Routine
                  </button>
                  <button className="btn-outline btn-danger" onClick={() => deleteProduct(p.id)}>Delete</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ── Modal: Add to routine ────────────────────────────────────────────
      function modalAddToRoutine() {
        const isFromRtn = !!addToRtnProd._rtnId;
        return (
          <div className="overlay" onClick={() => setAddToRtnProd(null)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="sheet-pad">
                {isFromRtn ? (
                  <>
                    <div className="m-title">Choose a product</div>
                    {products.filter(p => !(routines.find(r => r.id === addToRtnProd._rtnId)?.product_ids || []).includes(p.id)).length === 0 ? (
                      <p style={{color:'var(--warm-taupe)',fontSize:13,lineHeight:1.7}}>All your products are already in this routine — or add more products first!</p>
                    ) : products
                        .filter(p => !(routines.find(r => r.id === addToRtnProd._rtnId)?.product_ids || []).includes(p.id))
                        .map(p => (
                          <div key={p.id} className="p-list-row" onClick={() => addToRoutine(addToRtnProd._rtnId, p.id)}>
                            <div className="p-list-ph">{p.photo ? <img src={p.photo} alt={p.name}/> : <span>{p.step_emoji}</span>}</div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:600,color:'var(--espresso-black)'}}>{p.name}</div>
                              <div style={{fontSize:11,color:'var(--true-terracotta)',fontWeight:600,letterSpacing:'.06em',textTransform:'uppercase'}}>{p.brand}</div>
                            </div>
                            <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>{p.step_emoji} {p.step_name}</span>
                          </div>
                        ))}
                  </>
                ) : (
                  <>
                    <div className="m-title">Add to Routine</div>
                    <p style={{fontSize:13,color:'var(--dark-mocha)',marginBottom:18,lineHeight:1.55}}>
                      Where should <strong style={{color:'var(--espresso-black)'}}>{addToRtnProd.name}</strong> go?
                    </p>
                    {routines.map(r => (
                      <div key={r.id} className="r-card" style={{marginBottom:10}} onClick={() => addToRoutine(r.id, addToRtnProd.id)}>
                        <div className="r-em" style={{fontSize:24}}>{r.emoji}</div>
                        <div className="r-info">
                          <div className="r-name">{r.name}</div>
                          <div className="r-cnt">{(r.product_ids || []).filter(id => products.find(p => p.id === id)).length} products</div>
                        </div>
                        <div style={{color:'var(--true-terracotta)',fontSize:22,fontWeight:400}}>＋</div>
                      </div>
                    ))}
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ── Modal: Create routine ────────────────────────────────────────────
      function modalCreateRoutine() {
        return (
          <div className="overlay" onClick={() => setShowCreateRtn(false)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="sheet-pad">
                <div className="m-title">New Routine</div>
                <span className="form-lbl">Choose an emoji</span>
                <div className="em-pick">
                  {ROUTINE_EMOJIS.map(em => (
                    <button key={em} className={`em-btn ${rtnEmoji === em ? 'on' : ''}`}
                      onClick={() => setRtnEmoji(em)}>{em}</button>
                  ))}
                </div>
                <span className="form-lbl">Routine name</span>
                <input className="inp" placeholder="e.g. Anti-aging PM Routine"
                  value={rtnName} onChange={e => setRtnName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && createRoutine()} autoFocus />
                <div style={{display:'flex',gap:10,marginTop:24}}>
                  <button className="btn-primary" style={{flex:1,justifyContent:'center'}} onClick={createRoutine}>Create Routine</button>
                  <button className="btn-outline" onClick={() => setShowCreateRtn(false)}>Cancel</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ── Main render ──────────────────────────────────────────────────────
      if (loading) return null;

      return (
        <div className="sk-app">
          <div className="sk-header">
            <div className="sk-eyebrow">✦ Aesu ✦</div>
            <div className="sk-title">My Korean Skincare</div>
            <div className="sk-tabs">
              {[['products','Products'],['routines','Routines'],['aesu','Dear Aesu']].map(([id, lbl]) => (
                <button key={id} className={`sk-tab ${tab === id ? 'on' : ''}`} onClick={() => setTab(id)}>{lbl}</button>
              ))}
            </div>
          </div>

          {tab === 'aesu' ? renderAesu() : (
            <div className="sk-content">
              {tab === 'products' && renderProducts()}
              {tab === 'routines' && renderRoutines()}
            </div>
          )}

          <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} />
          <input ref={camRef}  type="file" accept="image/*" capture="environment" onChange={handleFile} />

          {analyzing && (
            <div className="spin-over">
              <div className="spin" />
              <div className="spin-t">Analyzing your product…</div>
              <div className="spin-s">Claude is identifying category & ingredients ✨</div>
            </div>
          )}

          {showAddProd   && modalAddProduct()}
          {selProd       && modalProductDetail()}
          {addToRtnProd  && modalAddToRoutine()}
          {showCreateRtn && modalCreateRoutine()}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
