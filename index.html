<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>My Korean Skincare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: none; }
    body { background: #FAF8F5; overflow-x: hidden; }
    input[type=file] { display: none; }

    /* ── Loading screen ─────────────────────────────────────── */
    .sk-init { display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:16px;background:#FAF8F5; }
    .sk-init-title { font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;color:#2C1F1A; }
    .sk-init-sub   { font-size:12px;color:#C9897A;letter-spacing:.1em;text-transform:uppercase; }
    .sk-spin-sm    { width:32px;height:32px;border:2.5px solid #F4EDE8;border-top-color:#C9897A;border-radius:50%;animation:sk-rot .75s linear infinite; }
    @keyframes sk-rot { to { transform:rotate(360deg); } }

    /* ── App shell ──────────────────────────────────────────── */
    .sk-app { font-family:'Nunito',system-ui,sans-serif;background:#FAF8F5;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;color:#2C1F1A;overflow:hidden; }
    .sk-header { background:linear-gradient(160deg,#FDF4F0,#FAF0F5);padding:18px 20px 0;border-bottom:1px solid #EEE0D8;flex-shrink:0; }
    .sk-eyebrow { font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#C9897A;font-weight:600;margin-bottom:4px; }
    .sk-title   { font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:600;letter-spacing:.02em;line-height:1.1; }
    .sk-tabs    { display:flex;margin-top:16px; }
    .sk-tab     { flex:1;padding:10px 6px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#C0A89A;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s; }
    .sk-tab.on  { color:#C9897A;border-bottom-color:#C9897A; }
    .sk-content { flex:1;overflow-y:auto;padding:20px 20px 48px;scrollbar-width:none; }
    .sk-content::-webkit-scrollbar { display:none; }
    .sk-chat-wrap { flex:1;display:flex;flex-direction:column;overflow:hidden; }

    /* ── Helpers ─────────────────────────────────────────────── */
    .row       { display:flex;align-items:center;justify-content:space-between;margin-bottom:18px; }
    .sec-title { font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;font-weight:600; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn-rose    { background:#C9897A;color:#fff;border:none;padding:9px 18px;border-radius:24px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .2s,transform .15s; }
    .btn-rose:hover { background:#B8786A;transform:translateY(-1px); }
    .btn-outline { background:none;color:#C9897A;border:1.5px solid #C9897A;padding:7px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s; }
    .btn-outline:hover { background:#C9897A;color:#fff; }
    .btn-danger  { color:#C97A7A!important;border-color:#C97A7A!important; }
    .btn-danger:hover { background:#C97A7A!important;color:#fff!important; }
    .btn-ghost   { background:none;border:none;cursor:pointer;color:#D0A090;font-size:18px;padding:4px;line-height:1;transition:color .2s; }
    .btn-ghost:hover { color:#C9897A; }
    .back-btn    { background:none;border:none;font-size:24px;cursor:pointer;color:#C9897A;padding:0;line-height:1;flex-shrink:0; }

    /* ── Badges ──────────────────────────────────────────────── */
    .badge { display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em;white-space:nowrap; }

    /* ── Filter chips ────────────────────────────────────────── */
    .chips { display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:14px;scrollbar-width:none; }
    .chips::-webkit-scrollbar { display:none; }
    .chip    { white-space:nowrap;padding:6px 14px;border-radius:20px;border:1.5px solid #E8DDD8;background:#fff;font-size:12px;font-weight:500;color:#8A7A74;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;flex-shrink:0; }
    .chip.on { background:#2C1F1A;border-color:#2C1F1A;color:#fff; }

    /* ── Product grid ────────────────────────────────────────── */
    .p-grid { display:grid;grid-template-columns:1fr 1fr;gap:14px; }
    .p-card       { background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 14px rgba(44,31,26,.07);cursor:pointer;transition:transform .2s,box-shadow .2s; }
    .p-card:hover { transform:translateY(-3px);box-shadow:0 6px 22px rgba(44,31,26,.11); }
    .p-photo      { width:100%;aspect-ratio:1;overflow:hidden;background:linear-gradient(135deg,#FDF4F0,#FAF0F5);display:flex;align-items:center;justify-content:center;font-size:40px; }
    .p-photo img  { width:100%;height:100%;object-fit:cover; }
    .p-body       { padding:10px 12px 12px; }
    .p-brand      { font-size:10px;color:#C9897A;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px; }
    .p-name       { font-size:13px;font-weight:600;color:#2C1F1A;margin-bottom:8px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
    .p-foot       { display:flex;align-items:center;justify-content:space-between;gap:4px; }
    .add-circ     { width:28px;height:28px;border-radius:50%;background:#C9897A;color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .15s;line-height:1; }
    .add-circ:hover { background:#B8786A;transform:scale(1.12); }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty     { text-align:center;padding:52px 24px;color:#C0A89A; }
    .empty-ico { font-size:48px;margin-bottom:14px; }
    .empty-t   { font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;color:#9A8A84;margin-bottom:8px; }
    .empty-d   { font-size:13px;line-height:1.65; }

    /* ── Modals ──────────────────────────────────────────────── */
    .overlay { position:fixed;inset:0;background:rgba(44,31,26,.54);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(6px); }
    .sheet   { background:#fff;border-radius:24px 24px 0 0;width:100%;max-height:92dvh;overflow-y:auto;animation:slideUp .28s ease;scrollbar-width:none; }
    .sheet::-webkit-scrollbar { display:none; }
    .handle  { width:36px;height:4px;background:#E0D4CF;border-radius:2px;margin:14px auto 22px; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sheet-pad { padding:0 24px 32px; }
    .m-title { font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:600;margin-bottom:18px; }
    .add-opts    { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px; }
    .add-opt     { border:2px dashed #E8DDD8;border-radius:16px;padding:26px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .2s;background:#FDFAF8;font-family:'Nunito',sans-serif; }
    .add-opt:hover { border-color:#C9897A;background:#FEF8F5; }
    .add-opt-ico { font-size:30px; }
    .add-opt-lbl { font-size:13px;font-weight:600;color:#6A5450;text-align:center; }

    /* ── Product detail ──────────────────────────────────────── */
    .det-photo     { width:100%;height:220px;overflow:hidden;background:linear-gradient(135deg,#FDF4F0,#FAF0F5);display:flex;align-items:center;justify-content:center;font-size:64px;border-radius:24px 24px 0 0; }
    .det-photo img { width:100%;height:100%;object-fit:cover; }
    .det-brand { font-size:11px;color:#C9897A;letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:4px; }
    .det-name  { font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;font-weight:600;margin-bottom:12px;line-height:1.2; }
    .sec-lbl   { font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#C0A89A;margin-bottom:6px;margin-top:18px;display:block; }
    .sec-txt   { font-size:13px;line-height:1.65;color:#4A3830; }
    .tags      { display:flex;flex-wrap:wrap;gap:6px; }
    .tag       { padding:4px 12px;border-radius:16px;background:#F4EDE8;color:#7A5A50;font-size:12px;font-weight:500; }
    .tag.green { background:#EDF5ED;color:#3D6B3D; }

    /* ── Routines ────────────────────────────────────────────── */
    .r-card       { background:#fff;border-radius:16px;padding:18px 20px;margin-bottom:12px;box-shadow:0 2px 12px rgba(44,31,26,.06);cursor:pointer;transition:transform .2s;display:flex;align-items:center;gap:14px; }
    .r-card:hover { transform:translateY(-2px); }
    .r-em   { font-size:30px;flex-shrink:0; }
    .r-info { flex:1; }
    .r-name { font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;font-weight:600; }
    .r-cnt  { font-size:12px;color:#C0A89A;margin-top:2px; }
    .r-arr  { color:#D8CAC4;font-size:20px; }
    .step-row { display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid #F4EDE8; }
    .step-num { width:26px;height:26px;border-radius:50%;background:#F4EDE8;color:#C9897A;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .step-ph      { width:46px;height:46px;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,#FDF4F0,#FAF0F5);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0; }
    .step-ph img  { width:100%;height:100%;object-fit:cover; }

    /* ── Inputs ──────────────────────────────────────────────── */
    .inp       { width:100%;border:1.5px solid #E8DDD8;border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;color:#2C1F1A;outline:none;background:#fff;transition:border-color .2s;margin-top:6px; }
    .inp:focus { border-color:#C9897A; }
    .lbl    { font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C0A89A;margin-top:16px;display:block; }
    .em-pick { display:flex;flex-wrap:wrap;gap:8px;margin-top:8px; }
    .em-btn    { width:38px;height:38px;border-radius:10px;border:2px solid #E8DDD8;background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s; }
    .em-btn.on { border-color:#C9897A;background:#FEF0EB; }

    /* ── Product list in modals ──────────────────────────────── */
    .p-list-row      { display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #F4EDE8;cursor:pointer;transition:background .15s; }
    .p-list-row:hover { background:#FEF8F5;margin:0 -24px;padding:12px 24px; }
    .p-list-ph     { width:38px;height:38px;border-radius:8px;overflow:hidden;background:#FDF4F0;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }
    .p-list-ph img { width:100%;height:100%;object-fit:cover; }

    /* ── Chat ────────────────────────────────────────────────── */
    .chat-hdr  { display:flex;align-items:center;gap:12px;padding:16px 20px;background:linear-gradient(135deg,#FDF4F0,#FAF0F5);border-bottom:1px solid #EEE0D8;flex-shrink:0; }
    .aesu-av   { width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#C9897A,#E8B4A8);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0; }
    .aesu-nm   { font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;font-weight:600; }
    .aesu-st   { font-size:11px;color:#8BA888;font-weight:600; }
    .msgs      { flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scrollbar-width:none; }
    .msgs::-webkit-scrollbar { display:none; }
    .msg       { display:flex;gap:10px;max-width:88%; }
    .msg.u     { margin-left:auto;flex-direction:row-reverse; }
    .av        { width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#C9897A,#E8B4A8);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0; }
    .msg.u .av { background:linear-gradient(135deg,#8BA888,#A8C4A6); }
    .bubble    { padding:11px 15px;border-radius:18px;font-size:13.5px;line-height:1.55;background:#fff;box-shadow:0 1px 6px rgba(44,31,26,.06);border-bottom-left-radius:4px;white-space:pre-wrap;word-break:break-word; }
    .msg.u .bubble { background:#2C1F1A;color:#FAF8F5;border-bottom-left-radius:18px;border-bottom-right-radius:4px; }
    .chat-inp-area { padding:12px 16px 20px;background:#fff;border-top:1px solid #EEE0D8;display:flex;gap:10px;align-items:flex-end;flex-shrink:0; }
    .chat-inp      { flex:1;border:1.5px solid #E8DDD8;border-radius:20px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:13.5px;color:#2C1F1A;outline:none;resize:none;max-height:100px;background:#FDFAF8;transition:border-color .2s;line-height:1.45; }
    .chat-inp:focus { border-color:#C9897A; }
    .chat-send          { width:40px;height:40px;border-radius:50%;background:#C9897A;border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s; }
    .chat-send:hover    { background:#B8786A; }
    .chat-send:disabled { background:#D8CAC4;cursor:default; }
    .dots span { display:inline-block;width:6px;height:6px;border-radius:50%;background:#C9897A;margin:0 2px;animation:bop 1.1s infinite; }
    .dots span:nth-child(2) { animation-delay:.18s; }
    .dots span:nth-child(3) { animation-delay:.36s; }
    @keyframes bop { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }

    /* ── Overlays ────────────────────────────────────────────── */
    .spin-over { position:fixed;inset:0;background:rgba(44,31,26,.72);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:16px; }
    .spin      { width:48px;height:48px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sk-rot .75s linear infinite; }
    .spin-t    { color:#fff;font-family:'Cormorant Garamond',Georgia,serif;font-size:18px;font-style:italic; }
    .spin-s    { color:rgba(255,255,255,.6);font-size:12px; }

    /* ── Toast ───────────────────────────────────────────────── */
    .toast { position:fixed;top:14px;right:14px;background:#2C1F1A;color:#FAF8F5;padding:7px 16px;border-radius:20px;font-size:11px;font-weight:600;z-index:400;opacity:0;transition:opacity .25s; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
  <div id="root">
    <div class="sk-init">
      <div class="sk-spin-sm"></div>
      <div class="sk-init-title">My Korean Skincare</div>
      <div class="sk-init-sub">Loading your routine…</div>
    </div>
  </div>

  <!-- CDN ─────────────────────────────────────────────────────────── -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Config ──────────────────────────────────────────────────────── -->
  <script>
    // ── UPDATE THESE THREE VALUES ──────────────────────────────────────────
    const SUPABASE_URL      = 'https://YOUR_PROJECT_ID.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const WORKER_URL        = 'https://YOUR_WORKER_NAME.YOUR_SUBDOMAIN.workers.dev';
    // ──────────────────────────────────────────────────────────────────────

    const STEPS = [
      { id:1,  name:'Oil Cleanser',    emoji:'🫧', bg:'#FDE8D8', fg:'#8B4A2E' },
      { id:2,  name:'Water Cleanser',  emoji:'💧', bg:'#D8EFFE', fg:'#1C5E8B' },
      { id:3,  name:'Exfoliator',      emoji:'✨', bg:'#EDD8FE', fg:'#5A1C8B' },
      { id:4,  name:'Toner',           emoji:'🌊', bg:'#D8FEEE', fg:'#1C8B5E' },
      { id:5,  name:'Essence',         emoji:'🌸', bg:'#FED8EC', fg:'#8B1C5E' },
      { id:6,  name:'Serum / Ampoule', emoji:'💎', bg:'#FEF0D4', fg:'#7A5C1A' },
      { id:7,  name:'Sheet Mask',      emoji:'🩵', bg:'#D8F0FE', fg:'#1C628B' },
      { id:8,  name:'Eye Cream',       emoji:'🌙', bg:'#EEF8DC', fg:'#3D6B1A' },
      { id:9,  name:'Moisturizer',     emoji:'🧴', bg:'#FFD8E8', fg:'#8B1C3E' },
      { id:10, name:'Sunscreen',       emoji:'☀️', bg:'#FEFED4', fg:'#7A7A1A' },
    ];
    const ROUTINE_EMOJIS = ['🌅','🌙','🌿','💆','✨','🫧','💎','🌸','⭐','🍃','🔥','🫶'];
  </script>

  <!-- App ─────────────────────────────────────────────────────────── -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Supabase client ────────────────────────────────────────────────────
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── Session ID (localStorage UUID → future: replace with Supabase Auth) ─
    // When adding auth: remove getUserId() and use (await db.auth.getUser()).data.user.id
    function getUserId() {
      let uid = localStorage.getItem('sk_uid');
      if (!uid) { uid = crypto.randomUUID(); localStorage.setItem('sk_uid', uid); }
      return uid;
    }
    const USER_ID = getUserId();

    // ── Image compression ──────────────────────────────────────────────────
    function compressImage(file, max = 600) {
      return new Promise(res => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          let { width: w, height: h } = img;
          if (w > max || h > max) {
            if (w > h) { h = Math.round(h / w * max); w = max; }
            else       { w = Math.round(w / h * max); h = max; }
          }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);
          res(c.toDataURL('image/jpeg', 0.75));
        };
        img.src = url;
      });
    }

    // ── Worker calls (Claude API key stays server-side) ────────────────────
    async function callAnalyze(b64) {
      const r = await fetch(`${WORKER_URL}/analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ imageBase64: b64 }),
      });
      if (!r.ok) throw new Error(`Analyze failed: ${r.status}`);
      return r.json();
    }

    async function callChat(history, products) {
      const r = await fetch(`${WORKER_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history,
          products: products.map(p => ({ name: p.name, brand: p.brand, step_name: p.step_name })),
        }),
      });
      if (!r.ok) throw new Error(`Chat failed: ${r.status}`);
      const d = await r.json();
      return d.reply;
    }

    // ── Toast helper ───────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      let el = document.getElementById('sk-toast');
      if (!el) { el = document.createElement('div'); el.id = 'sk-toast'; el.className = 'toast'; document.body.appendChild(el); }
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    // ─────────────────────────────────────────────────────────────────────
    // App
    // ─────────────────────────────────────────────────────────────────────
    function App() {
      const [loading, setLoading]         = useState(true);
      const [tab, setTab]                 = useState('products');
      const [products, setProducts]       = useState([]);
      const [routines, setRoutines]       = useState([]);
      const [messages, setMessages]       = useState([{
        role: 'assistant',
        content: '안녕하세요! 🌸 I\'m Dear Aesu, your personal K-beauty advisor.\n\nTell me about your skin concerns — or ask me anything about Korean skincare and I\'ll help you build your perfect routine!',
      }]);
      const [filterStep, setFilterStep]   = useState(null);
      const [analyzing, setAnalyzing]     = useState(false);
      const [chatLoading, setChatLoading] = useState(false);
      const [chatInput, setChatInput]     = useState('');
      const [showAddProd, setShowAddProd] = useState(false);
      const [selProd, setSelProd]         = useState(null);
      const [selRoutine, setSelRoutine]   = useState(null);
      const [addToRtnProd, setAddToRtnProd] = useState(null);
      const [showCreateRtn, setShowCreateRtn] = useState(false);
      const [rtnName, setRtnName]         = useState('');
      const [rtnEmoji, setRtnEmoji]       = useState('✨');

      const fileRef = useRef();
      const camRef  = useRef();
      const chatEnd = useRef();

      // ── Load data ──────────────────────────────────────────────────────
      useEffect(() => {
        (async () => {
          try {
            const [{ data: prods, error: pErr }, { data: rtns, error: rErr }] = await Promise.all([
              db.from('products').select('*').eq('user_id', USER_ID).order('created_at'),
              db.from('routines').select('*').eq('user_id', USER_ID).order('created_at'),
            ]);
            if (pErr) throw pErr;
            if (rErr) throw rErr;

            setProducts(prods || []);

            if (!rtns || rtns.length === 0) {
              // First visit → seed default routines
              const { data: seeds, error: sErr } = await db.from('routines').insert([
                { user_id: USER_ID, name: 'AM Routine', emoji: '🌅', product_ids: [] },
                { user_id: USER_ID, name: 'PM Routine', emoji: '🌙', product_ids: [] },
              ]).select();
              if (sErr) throw sErr;
              setRoutines(seeds || []);
            } else {
              setRoutines(rtns);
            }
          } catch (e) {
            console.error('Load error:', e);
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      useEffect(() => {
        chatEnd.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, chatLoading]);

      // ── File / camera handler ──────────────────────────────────────────
      async function handleFile(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        e.target.value = '';
        setShowAddProd(false);
        setAnalyzing(true);
        try {
          const dataUrl = await compressImage(file);
          const b64 = dataUrl.split(',')[1];
          const info = await callAnalyze(b64);
          const step = STEPS.find(s => s.id === Number(info.step_id)) || STEPS[0];

          const row = {
            user_id:            USER_ID,
            name:               info.name              || 'Unknown Product',
            brand:              info.brand             || 'Unknown Brand',
            step_id:            step.id,
            step_name:          step.name,
            step_bg:            step.bg,
            step_fg:            step.fg,
            step_emoji:         step.emoji,
            how_to_use:         info.how_to_use        || '',
            active_ingredients: Array.isArray(info.active_ingredients) ? info.active_ingredients : [],
            suitable_for:       Array.isArray(info.suitable_for)       ? info.suitable_for       : [],
            photo:              dataUrl,
          };

          const { data, error } = await db.from('products').insert(row).select().single();
          if (error) throw error;
          setProducts(prev => [...prev, data]);
          showToast('Product saved ✓');
        } catch (err) {
          console.error(err);
          alert('Could not analyze this product — please try again! 🙏');
        } finally {
          setAnalyzing(false);
        }
      }

      // ── Chat ───────────────────────────────────────────────────────────
      async function sendChat() {
        if (!chatInput.trim() || chatLoading) return;
        const userMsg = { role: 'user', content: chatInput.trim() };
        const history = [...messages, userMsg];
        setMessages(history);
        setChatInput('');
        setChatLoading(true);
        try {
          const reply = await callChat(history, products);
          setMessages(h => [...h, { role: 'assistant', content: reply }]);
        } catch {
          setMessages(h => [...h, { role: 'assistant', content: '죄송해요! Something went wrong — please try again 🙏' }]);
        } finally {
          setChatLoading(false);
        }
      }

      // ── Routine CRUD ───────────────────────────────────────────────────
      async function addToRoutine(routineId, productId) {
        const rtn = routines.find(r => r.id === routineId);
        if (!rtn || (rtn.product_ids || []).includes(productId)) { setAddToRtnProd(null); return; }
        const newIds = [...(rtn.product_ids || []), productId];
        setRoutines(rs => rs.map(r => r.id === routineId ? { ...r, product_ids: newIds } : r));
        setAddToRtnProd(null);
        await db.from('routines').update({ product_ids: newIds }).eq('id', routineId);
        showToast('Added to routine ✓');
      }

      async function removeFromRoutine(routineId, productId) {
        const rtn = routines.find(r => r.id === routineId);
        if (!rtn) return;
        const newIds = (rtn.product_ids || []).filter(id => id !== productId);
        setRoutines(rs => rs.map(r => r.id === routineId ? { ...r, product_ids: newIds } : r));
        await db.from('routines').update({ product_ids: newIds }).eq('id', routineId);
      }

      async function createRoutine() {
        if (!rtnName.trim()) return;
        const { data, error } = await db.from('routines').insert({
          user_id: USER_ID, name: rtnName.trim(), emoji: rtnEmoji, product_ids: [],
        }).select().single();
        if (error) { console.error(error); return; }
        setRoutines(rs => [...rs, data]);
        setRtnName(''); setRtnEmoji('✨'); setShowCreateRtn(false);
      }

      async function deleteProduct(id) {
        setProducts(ps => ps.filter(p => p.id !== id));
        setSelProd(null);
        // Cascade: remove from all routines
        const affected = routines.filter(r => (r.product_ids || []).includes(id));
        setRoutines(rs => rs.map(r => ({ ...r, product_ids: (r.product_ids || []).filter(pid => pid !== id) })));
        await db.from('products').delete().eq('id', id);
        for (const r of affected) {
          await db.from('routines').update({ product_ids: (r.product_ids || []).filter(pid => pid !== id) }).eq('id', r.id);
        }
      }

      // ── Helpers ────────────────────────────────────────────────────────
      function getRoutineProducts(rtn) {
        return (rtn.product_ids || [])
          .map(id => products.find(p => p.id === id))
          .filter(Boolean)
          .sort((a, b) => a.step_id - b.step_id);
      }

      const filtered = filterStep ? products.filter(p => p.step_id === filterStep) : products;

      // ── Render helpers ─────────────────────────────────────────────────

      function renderProducts() {
        return (
          <>
            <div className="row">
              <h2 className="sec-title">
                My Products{' '}
                <span style={{fontFamily:'Nunito',fontSize:14,color:'#C0A89A',fontWeight:400}}>({products.length})</span>
              </h2>
              <button className="btn-rose" onClick={() => setShowAddProd(true)}>＋ Add</button>
            </div>

            {products.length > 0 && (
              <div className="chips">
                <button className={`chip ${!filterStep ? 'on' : ''}`} onClick={() => setFilterStep(null)}>All</button>
                {STEPS.filter(s => products.some(p => p.step_id === s.id)).map(s => (
                  <button key={s.id} className={`chip ${filterStep === s.id ? 'on' : ''}`}
                    onClick={() => setFilterStep(filterStep === s.id ? null : s.id)}>
                    {s.emoji} {s.name}
                  </button>
                ))}
              </div>
            )}

            {filtered.length === 0 ? (
              <div className="empty">
                <div className="empty-ico">🧴</div>
                <div className="empty-t">No products yet</div>
                <div className="empty-d">Tap "Add" to photograph your first product —<br />Claude will identify it and fill in everything!</div>
              </div>
            ) : (
              <div className="p-grid">
                {filtered.map(p => (
                  <div className="p-card" key={p.id} onClick={() => setSelProd(p)}>
                    <div className="p-photo">
                      {p.photo ? <img src={p.photo} alt={p.name} /> : <span>{p.step_emoji}</span>}
                    </div>
                    <div className="p-body">
                      <div className="p-brand">{p.brand}</div>
                      <div className="p-name">{p.name}</div>
                      <div className="p-foot">
                        <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>
                          {p.step_emoji} {p.step_name}
                        </span>
                        <button className="add-circ" title="Add to routine"
                          onClick={e => { e.stopPropagation(); setAddToRtnProd(p); }}>＋</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </>
        );
      }

      function renderRoutines() {
        if (selRoutine) {
          const rtn = routines.find(r => r.id === selRoutine);
          if (!rtn) { setSelRoutine(null); return null; }
          const rps = getRoutineProducts(rtn);
          return (
            <>
              <div className="row">
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <button className="back-btn" onClick={() => setSelRoutine(null)}>←</button>
                  <h2 className="sec-title">{rtn.emoji} {rtn.name}</h2>
                </div>
                <button className="btn-outline" onClick={() => setAddToRtnProd({ _rtnId: rtn.id })}>＋ Step</button>
              </div>
              {rps.length === 0 ? (
                <div className="empty">
                  <div className="empty-ico">{rtn.emoji}</div>
                  <div className="empty-t">Routine is empty</div>
                  <div className="empty-d">Tap "＋ Step" or use the ＋ on any product card.</div>
                </div>
              ) : rps.map(p => (
                <div className="step-row" key={p.id}>
                  <div className="step-num">{p.step_id}</div>
                  <div className="step-ph">
                    {p.photo ? <img src={p.photo} alt={p.name} /> : <span>{p.step_emoji}</span>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:10,color:'#C9897A',fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase'}}>{p.brand}</div>
                    <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{p.name}</div>
                    <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>{p.step_emoji} {p.step_name}</span>
                  </div>
                  <button className="btn-ghost" onClick={() => removeFromRoutine(rtn.id, p.id)} title="Remove">✕</button>
                </div>
              ))}
            </>
          );
        }
        return (
          <>
            <div className="row">
              <h2 className="sec-title">My Routines</h2>
              <button className="btn-rose" onClick={() => setShowCreateRtn(true)}>＋ New</button>
            </div>
            {routines.map(r => {
              const cnt = (r.product_ids || []).filter(id => products.find(p => p.id === id)).length;
              return (
                <div className="r-card" key={r.id} onClick={() => setSelRoutine(r.id)}>
                  <div className="r-em">{r.emoji}</div>
                  <div className="r-info">
                    <div className="r-name">{r.name}</div>
                    <div className="r-cnt">{cnt === 0 ? 'No products yet' : `${cnt} step${cnt !== 1 ? 's' : ''}`}</div>
                  </div>
                  <div className="r-arr">›</div>
                </div>
              );
            })}
          </>
        );
      }

      function renderAesu() {
        return (
          <div className="sk-chat-wrap">
            <div className="chat-hdr">
              <div className="aesu-av">🌸</div>
              <div>
                <div className="aesu-nm">Dear Aesu</div>
                <div className="aesu-st">● Your K-beauty advisor</div>
              </div>
            </div>
            <div className="msgs">
              {messages.map((m, i) => (
                <div key={i} className={`msg ${m.role === 'user' ? 'u' : ''}`}>
                  <div className="av">{m.role === 'user' ? '🌿' : '🌸'}</div>
                  <div className="bubble">{m.content}</div>
                </div>
              ))}
              {chatLoading && (
                <div className="msg">
                  <div className="av">🌸</div>
                  <div className="bubble"><div className="dots"><span/><span/><span/></div></div>
                </div>
              )}
              <div ref={chatEnd} />
            </div>
            <div className="chat-inp-area">
              <textarea className="chat-inp" value={chatInput}
                onChange={e => setChatInput(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } }}
                placeholder="Ask Dear Aesu anything…" rows={1} />
              <button className="chat-send" onClick={sendChat} disabled={chatLoading || !chatInput.trim()}>↑</button>
            </div>
          </div>
        );
      }

      // ── Modals ─────────────────────────────────────────────────────────

      function modalAddProduct() {
        return (
          <div className="overlay" onClick={() => setShowAddProd(false)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="sheet-pad">
                <div className="m-title">Add Product</div>
                <div className="add-opts">
                  <div className="add-opt" onClick={() => camRef.current?.click()}>
                    <div className="add-opt-ico">📸</div>
                    <div className="add-opt-lbl">Take Photo</div>
                  </div>
                  <div className="add-opt" onClick={() => fileRef.current?.click()}>
                    <div className="add-opt-ico">🖼️</div>
                    <div className="add-opt-lbl">Upload Image</div>
                  </div>
                </div>
                <p style={{marginTop:18,fontSize:12,color:'#C0A89A',textAlign:'center',lineHeight:1.65}}>
                  Claude will auto-detect the product name, K-beauty step, ingredients & usage ✨
                </p>
              </div>
            </div>
          </div>
        );
      }

      function modalProductDetail() {
        const p = selProd;
        return (
          <div className="overlay" onClick={() => setSelProd(null)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="det-photo">
                {p.photo ? <img src={p.photo} alt={p.name} /> : <span>{p.step_emoji}</span>}
              </div>
              <div className="sheet-pad" style={{paddingTop:20}}>
                <div className="det-brand">{p.brand}</div>
                <div className="det-name">{p.name}</div>
                <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>
                  Step {p.step_id} · {p.step_emoji} {p.step_name}
                </span>
                <span className="sec-lbl">How to Use</span>
                <div className="sec-txt">{p.how_to_use || '—'}</div>
                <span className="sec-lbl">Key Actives</span>
                <div className="tags">
                  {(p.active_ingredients || []).length
                    ? (p.active_ingredients || []).map((ing, i) => <span key={i} className="tag">{ing}</span>)
                    : <span className="tag">—</span>}
                </div>
                <span className="sec-lbl">Suitable For</span>
                <div className="tags">
                  {(p.suitable_for || []).length
                    ? (p.suitable_for || []).map((s, i) => <span key={i} className="tag green">{s}</span>)
                    : <span className="tag">—</span>}
                </div>
                <div style={{display:'flex',gap:10,marginTop:26,marginBottom:8}}>
                  <button className="btn-rose" style={{flex:1,justifyContent:'center'}}
                    onClick={() => { setAddToRtnProd(p); setSelProd(null); }}>
                    Add to Routine
                  </button>
                  <button className="btn-outline btn-danger" onClick={() => deleteProduct(p.id)}>Delete</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function modalAddToRoutine() {
        const isFromRtn = !!addToRtnProd._rtnId;
        return (
          <div className="overlay" onClick={() => setAddToRtnProd(null)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="sheet-pad">
                {isFromRtn ? (
                  <>
                    <div className="m-title">Add a product</div>
                    {products.filter(p => !(routines.find(r => r.id === addToRtnProd._rtnId)?.product_ids || []).includes(p.id)).length === 0
                      ? <p style={{color:'#C0A89A',fontSize:13}}>All your products are already in this routine!</p>
                      : products
                          .filter(p => !(routines.find(r => r.id === addToRtnProd._rtnId)?.product_ids || []).includes(p.id))
                          .map(p => (
                            <div key={p.id} className="p-list-row" onClick={() => addToRoutine(addToRtnProd._rtnId, p.id)}>
                              <div className="p-list-ph">
                                {p.photo ? <img src={p.photo} alt={p.name} /> : <span>{p.step_emoji}</span>}
                              </div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:13,fontWeight:600}}>{p.name}</div>
                                <div style={{fontSize:11,color:'#C9897A'}}>{p.brand}</div>
                              </div>
                              <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>{p.step_emoji} {p.step_name}</span>
                            </div>
                          ))}
                  </>
                ) : (
                  <>
                    <div className="m-title">Add to Routine</div>
                    <p style={{fontSize:13,color:'#8A7A74',marginBottom:16}}>
                      Where should <strong>{addToRtnProd.name}</strong> go?
                    </p>
                    {routines.map(r => (
                      <div key={r.id} className="r-card" style={{marginBottom:10}}
                        onClick={() => addToRoutine(r.id, addToRtnProd.id)}>
                        <div className="r-em" style={{fontSize:24}}>{r.emoji}</div>
                        <div className="r-info">
                          <div className="r-name">{r.name}</div>
                          <div className="r-cnt">
                            {(r.product_ids || []).filter(id => products.find(p => p.id === id)).length} products
                          </div>
                        </div>
                        <div style={{color:'#C9897A',fontSize:20}}>＋</div>
                      </div>
                    ))}
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      function modalCreateRoutine() {
        return (
          <div className="overlay" onClick={() => setShowCreateRtn(false)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="sheet-pad">
                <div className="m-title">New Routine</div>
                <span className="lbl">Choose an emoji</span>
                <div className="em-pick">
                  {ROUTINE_EMOJIS.map(em => (
                    <button key={em} className={`em-btn ${rtnEmoji === em ? 'on' : ''}`}
                      onClick={() => setRtnEmoji(em)}>{em}</button>
                  ))}
                </div>
                <span className="lbl">Routine name</span>
                <input className="inp" placeholder="e.g. Anti-aging PM Routine"
                  value={rtnName} onChange={e => setRtnName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && createRoutine()} autoFocus />
                <div style={{display:'flex',gap:10,marginTop:22}}>
                  <button className="btn-rose" style={{flex:1,justifyContent:'center'}} onClick={createRoutine}>Create</button>
                  <button className="btn-outline" onClick={() => setShowCreateRtn(false)}>Cancel</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ── Main render ────────────────────────────────────────────────────
      if (loading) return null; // HTML loading screen stays visible

      return (
        <div className="sk-app">
          <div className="sk-header">
            <div className="sk-eyebrow">✦ K-beauty ✦</div>
            <div className="sk-title">My Korean Skincare</div>
            <div className="sk-tabs">
              {[['products','Products'],['routines','Routines'],['aesu','Dear Aesu']].map(([id, lbl]) => (
                <button key={id} className={`sk-tab ${tab === id ? 'on' : ''}`} onClick={() => setTab(id)}>{lbl}</button>
              ))}
            </div>
          </div>

          {tab === 'aesu' ? renderAesu() : (
            <div className="sk-content">
              {tab === 'products' && renderProducts()}
              {tab === 'routines' && renderRoutines()}
            </div>
          )}

          <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} />
          <input ref={camRef}  type="file" accept="image/*" capture="environment" onChange={handleFile} />

          {analyzing && (
            <div className="spin-over">
              <div className="spin" />
              <div className="spin-t">Analyzing your product…</div>
              <div className="spin-s">Claude is identifying category & ingredients ✨</div>
            </div>
          )}

          {showAddProd   && modalAddProduct()}
          {selProd       && modalProductDetail()}
          {addToRtnProd  && modalAddToRoutine()}
          {showCreateRtn && modalCreateRoutine()}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
