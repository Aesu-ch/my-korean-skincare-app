<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>My Korean Skincare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pearl:#FDFCFA; --warm-white:#F8F4EF; --ivory:#F4EDE6; --porcelain:#EFE8E0;
      --cream:#EAE0D8; --linen:#F5EFE8; --blush:#EDE6DF; --dusty:#E8DDD4;
      --greige:#DED6CE; --pebble:#D4CBC2;
      --terra:#C45C3A; --clay:#A64830; --amber:#D4825A; --sand:#E8AA88; --dune:#F0CDB0;
      --caramel:#C4A882; --honey:#B89A7A; --apricot:#D4B8A0; --peach:#E8C4B0;
      --espresso:#3A3530; --mocha:#6B5E52; --taupe:#8A7A6E; --stone:#B8A898; --silver:#D4C8BC;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:none}
    body{background:var(--linen);overflow-x:hidden}
    input[type=file]{display:none}

    .sk-init{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:16px;background:var(--linen)}
    .sk-init-logo{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--terra)}
    .sk-init-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:var(--espresso)}
    .sk-init-sub{font-size:11px;color:var(--taupe);letter-spacing:.12em;text-transform:uppercase}
    .sk-spin-sm{width:28px;height:28px;border:2px solid var(--cream);border-top-color:var(--terra);border-radius:50%;animation:rot .75s linear infinite}
    @keyframes rot{to{transform:rotate(360deg)}}

    .sk-app{font-family:'Nunito',sans-serif;background:var(--linen);height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;color:var(--espresso);overflow:hidden}
    .sk-header{background:var(--pearl);padding:20px 22px 0;border-bottom:1px solid var(--cream);flex-shrink:0}
    .sk-eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--terra);font-weight:600;margin-bottom:4px}
    .sk-title{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:500;letter-spacing:.02em;line-height:1.1}
    .sk-tabs{display:flex;margin-top:16px}
    .sk-tab{flex:1;padding:10px 4px;border:none;background:none;font-family:'Nunito',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
    .sk-tab.on{color:var(--terra);border-bottom-color:var(--terra)}
    .sk-content{flex:1;overflow-y:auto;padding:20px 20px 52px;scrollbar-width:none}
    .sk-content::-webkit-scrollbar{display:none}

    .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .sec-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:500}

    .btn-primary{background:var(--terra);color:var(--pearl);border:none;padding:9px 20px;border-radius:24px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .2s,transform .15s}
    .btn-primary:hover{background:var(--clay);transform:translateY(-1px)}
    .btn-outline{background:none;color:var(--terra);border:1.5px solid var(--terra);padding:7px 15px;border-radius:22px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-outline:hover{background:var(--terra);color:var(--pearl)}
    .btn-danger{color:var(--clay)!important;border-color:var(--clay)!important}
    .btn-danger:hover{background:var(--clay)!important;color:var(--pearl)!important}
    .btn-ghost{background:none;border:none;cursor:pointer;color:var(--pebble);font-size:18px;padding:4px;line-height:1;transition:color .2s}
    .btn-ghost:hover{color:var(--terra)}
    .back-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--terra);padding:0;line-height:1;flex-shrink:0}
    .add-circ{width:28px;height:28px;border-radius:50%;background:var(--terra);color:var(--pearl);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .15s;line-height:1}
    .add-circ:hover{background:var(--clay);transform:scale(1.1)}

    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:600;letter-spacing:.02em;white-space:nowrap}

    /* ── Filter chips ── */
    .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
    .chips::-webkit-scrollbar{display:none}
    .chip{white-space:nowrap;padding:6px 14px;border-radius:22px;border:1.5px solid var(--silver);background:var(--pearl);font-size:12px;font-weight:500;color:var(--taupe);cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;flex-shrink:0}
    .chip.on{background:var(--espresso);border-color:var(--espresso);color:var(--pearl)}

    /* ── Filter panel ── */
    .filter-section{margin-bottom:14px}
    .filter-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);margin-bottom:8px;display:block}
    .filter-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
    .filter-chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--silver);background:var(--pearl);font-size:11.5px;font-weight:500;color:var(--taupe);cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif}
    .filter-chip.on{background:var(--espresso);border-color:var(--espresso);color:var(--pearl)}
    .filter-toggle{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--taupe);padding:0;margin-bottom:14px;transition:color .2s}
    .filter-toggle:hover{color:var(--terra)}
    .filter-divider{height:1px;background:var(--cream);margin-bottom:14px}

    /* ── Product grid ── */
    .p-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .p-card{background:var(--pearl);border-radius:18px;overflow:hidden;border:1px solid var(--ivory);cursor:pointer;transition:transform .2s,box-shadow .2s}
    .p-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(58,53,48,.10)}
    .p-photo{width:100%;aspect-ratio:1;overflow:hidden;background:linear-gradient(135deg,var(--ivory),var(--blush));display:flex;align-items:center;justify-content:center;font-size:40px}
    .p-photo img{width:100%;height:100%;object-fit:cover}
    .p-body{padding:10px 12px 12px}
    .p-brand{font-size:10px;color:var(--terra);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
    .p-name{font-size:13px;font-weight:600;color:var(--espresso);margin-bottom:8px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .p-foot{display:flex;align-items:center;justify-content:space-between;gap:4px}

    /* ── Empty states ── */
    .empty{text-align:center;padding:52px 24px;color:var(--stone)}
    .empty-ico{font-size:48px;margin-bottom:14px}
    .empty-t{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:var(--taupe);margin-bottom:8px}
    .empty-d{font-size:13px;line-height:1.7;color:var(--taupe)}

    /* ── Modals ── */
    .overlay{position:fixed;inset:0;background:rgba(58,53,48,.52);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(8px)}
    .sheet{background:var(--pearl);border-radius:26px 26px 0 0;width:100%;max-height:92dvh;overflow-y:auto;animation:slideUp .28s ease;scrollbar-width:none;border-top:1px solid var(--ivory)}
    .sheet::-webkit-scrollbar{display:none}
    .handle{width:36px;height:4px;background:var(--cream);border-radius:2px;margin:14px auto 20px}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sheet-pad{padding:0 24px 36px}
    .m-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;margin-bottom:18px}

    /* ── Add product ── */
    .add-opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
    .add-opt{border:1.5px dashed var(--pebble);border-radius:18px;padding:26px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all .2s;background:var(--linen)}
    .add-opt:hover{border-color:var(--terra);background:var(--ivory)}
    .add-opt-ico{font-size:30px}
    .add-opt-lbl{font-size:13px;font-weight:600;color:var(--mocha);text-align:center}

    /* ── Product detail ── */
    .det-photo{width:100%;height:220px;overflow:hidden;background:linear-gradient(135deg,var(--ivory),var(--blush));display:flex;align-items:center;justify-content:center;font-size:68px;border-radius:26px 26px 0 0}
    .det-photo img{width:100%;height:100%;object-fit:cover}
    .det-brand{font-size:11px;color:var(--terra);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:4px}
    .det-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;margin-bottom:12px;line-height:1.2}
    .sec-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);margin:16px 0 6px;display:block}
    .sec-txt{font-size:13px;line-height:1.65;color:var(--mocha)}
    .tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{padding:4px 12px;border-radius:16px;background:var(--ivory);color:var(--mocha);font-size:12px;font-weight:500}
    .tag.green{background:#EDF5ED;color:#3D6B3D}

    /* ── Routines ── */
    .r-card{background:var(--pearl);border-radius:16px;padding:17px 20px;margin-bottom:12px;box-shadow:0 2px 12px rgba(58,53,48,.05);cursor:pointer;transition:transform .2s;display:flex;align-items:center;gap:14px;border:1px solid var(--ivory)}
    .r-card:hover{transform:translateY(-2px)}
    .r-em{font-size:28px;flex-shrink:0}
    .r-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500}
    .r-cnt{font-size:12px;color:var(--stone);margin-top:2px}

    /* ── Routine step rows ── */
    .step-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--ivory);transition:opacity .2s}
    .step-row.dragging{opacity:.4}
    .step-row.drag-over{border-top:2px solid var(--terra)}
    .drag-handle{color:var(--silver);font-size:16px;cursor:grab;padding:2px 4px;flex-shrink:0;touch-action:none}
    .drag-handle:active{cursor:grabbing}
    .step-num-label{display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:36px}
    .step-num{width:24px;height:24px;border-radius:50%;background:var(--ivory);color:var(--terra);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
    .step-name-sm{font-size:8.5px;color:var(--stone);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:2px;text-align:center;max-width:44px;line-height:1.2}
    .step-ph{width:44px;height:44px;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,var(--ivory),var(--blush));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .step-ph img{width:100%;height:100%;object-fit:cover}
    .step-ghost{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--ivory)}
    .step-ghost-btn{display:flex;align-items:center;gap:8px;background:none;border:1.5px dashed var(--silver);border-radius:12px;padding:8px 14px;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--stone);flex:1}
    .step-ghost-btn:hover{border-color:var(--terra);color:var(--terra);background:var(--ivory)}

    /* ── Product list in modals ── */
    .p-list-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--ivory);cursor:pointer;transition:background .15s}
    .p-list-row:hover{background:var(--linen);margin:0 -24px;padding:12px 24px}
    .p-list-ph{width:36px;height:36px;border-radius:8px;overflow:hidden;background:var(--ivory);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .p-list-ph img{width:100%;height:100%;object-fit:cover}

    /* ── Inputs ── */
    .inp{width:100%;border:1.5px solid var(--cream);border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--espresso);outline:none;background:var(--pearl);transition:border-color .2s;margin-top:6px}
    .inp:focus{border-color:var(--terra)}
    .lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin-top:14px;display:block}
    .em-pick{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .em-btn{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--cream);background:var(--pearl);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .em-btn.on{border-color:var(--terra);background:var(--ivory)}

    /* ── Quiz / Aesu ── */
    .quiz-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .quiz-hdr{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--pearl);border-bottom:1px solid var(--cream);flex-shrink:0}
    .aesu-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--amber),var(--dune));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .aesu-nm{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500}
    .aesu-st{font-size:11px;color:#8BA888;font-weight:600}
    .quiz-restart{margin-left:auto;background:none;border:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--stone);letter-spacing:.08em;text-transform:uppercase;transition:color .2s}
    .quiz-restart:hover{color:var(--terra)}

    .quiz-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scrollbar-width:none}
    .quiz-msgs::-webkit-scrollbar{display:none}
    .qmsg{display:flex;gap:10px;max-width:90%}
    .qmsg.u{margin-left:auto;flex-direction:row-reverse}
    .qav{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--amber),var(--dune));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .qmsg.u .qav{background:linear-gradient(135deg,var(--caramel),var(--honey))}
    .qbubble{padding:11px 15px;border-radius:18px;font-size:13.5px;line-height:1.6;background:var(--pearl);border:1px solid var(--ivory);border-bottom-left-radius:4px;white-space:pre-wrap;word-break:break-word}
    .qmsg.u .qbubble{background:var(--espresso);color:var(--warm-white);border:none;border-bottom-left-radius:18px;border-bottom-right-radius:4px}
    .dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber);margin:0 2px;animation:bop 1.1s infinite}
    .dots span:nth-child(2){animation-delay:.18s}
    .dots span:nth-child(3){animation-delay:.36s}
    @keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

    .quiz-choices{padding:0 20px 12px;display:flex;flex-wrap:wrap;gap:8px}
    .q-choice{padding:8px 16px;border-radius:22px;border:1.5px solid var(--terra);background:var(--pearl);font-family:'Nunito',sans-serif;font-size:13px;font-weight:500;color:var(--terra);cursor:pointer;transition:all .2s}
    .q-choice:hover{background:var(--terra);color:var(--pearl)}
    .q-choice.sel{background:var(--terra);color:var(--pearl)}
    .q-confirm{margin:8px 20px 0;padding:9px 24px;border-radius:22px;background:var(--espresso);color:var(--pearl);border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
    .q-confirm:hover{background:var(--mocha)}

    .quiz-inp-area{padding:10px 16px 20px;background:var(--pearl);border-top:1px solid var(--cream);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
    .quiz-inp{flex:1;border:1.5px solid var(--cream);border-radius:20px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:13.5px;color:var(--espresso);outline:none;resize:none;max-height:80px;background:var(--linen);transition:border-color .2s;line-height:1.45}
    .quiz-inp:focus{border-color:var(--terra)}
    .quiz-inp::placeholder{color:var(--stone)}
    .quiz-send{width:38px;height:38px;border-radius:50%;background:var(--terra);border:none;color:var(--pearl);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
    .quiz-send:hover{background:var(--clay)}
    .quiz-send:disabled{background:var(--pebble);cursor:default}

    /* ── Recommendation cards ── */
    .rec-section{padding:0 20px 32px}
    .rec-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;margin-bottom:4px}
    .rec-profile{font-size:12px;color:var(--taupe);line-height:1.6;margin-bottom:18px}
    .rec-card{background:var(--pearl);border-radius:16px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--ivory);display:flex;gap:12px;align-items:center}
    .rec-ph{width:48px;height:48px;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,var(--ivory),var(--blush));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .rec-ph img{width:100%;height:100%;object-fit:cover}
    .rec-body{flex:1;min-width:0}
    .rec-brand{font-size:10px;color:var(--terra);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
    .rec-name{font-size:13px;font-weight:600;line-height:1.3;margin:2px 0 4px}
    .rec-reason{font-size:11.5px;color:var(--taupe);line-height:1.5}
    .rec-add{width:30px;height:30px;border-radius:50%;background:var(--terra);color:var(--pearl);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
    .rec-add:hover{background:var(--clay);transform:scale(1.1)}
    .rec-add.added{background:var(--greige);cursor:default}
    .rec-actions{display:flex;gap:10px;margin-top:16px;padding-bottom:4px}

    /* ── Overlays ── */
    .spin-over{position:fixed;inset:0;background:rgba(58,53,48,.76);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:16px}
    .spin{width:46px;height:46px;border:3px solid rgba(253,252,250,.2);border-top-color:var(--pearl);border-radius:50%;animation:rot .75s linear infinite}
    .spin-t{color:var(--pearl);font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic}
    .spin-s{color:rgba(253,252,250,.6);font-size:12px}
    .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--espresso);color:var(--warm-white);padding:8px 20px;border-radius:22px;font-size:12px;font-weight:600;z-index:400;opacity:0;transition:opacity .25s;white-space:nowrap}
    .toast.show{opacity:1}
  </style>
</head>
<body>
  <div id="root">
    <div class="sk-init">
      <div class="sk-init-logo">✦ Aesu ✦</div>
      <div class="sk-spin-sm"></div>
      <div class="sk-init-title">My Korean Skincare</div>
      <div class="sk-init-sub">Loading your routine…</div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    const SUPABASE_URL      = 'https://tclsndvassbosributcj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_IuaOUqFtitxNZEvbUn7SOw_kO3RkdMe';
    const WORKER_URL        = 'https://korean-skincare-app.naomi-c-lovera.workers.dev';

    const STEPS = [
      { id:1,  name:'Oil Cleanser',   emoji:'🫧', bg:'#EAE0D8', fg:'#6B5E52' },
      { id:2,  name:'Water Cleanser', emoji:'💧', bg:'#EFE8E0', fg:'#6B5E52' },
      { id:3,  name:'Exfoliator',     emoji:'✨', bg:'#F0D0B8', fg:'#A64830' },
      { id:4,  name:'Toner',          emoji:'🌊', bg:'#D4B8A0', fg:'#6B5E52' },
      { id:5,  name:'Essence',        emoji:'🌸', bg:'#E8C4B0', fg:'#A64830' },
      { id:6,  name:'Serum',          emoji:'💎', bg:'#E8AA88', fg:'#A64830' },
      { id:7,  name:'Sheet Mask',     emoji:'🩵', bg:'#DED6CE', fg:'#6B5E52' },
      { id:8,  name:'Eye Cream',      emoji:'🌙', bg:'#D4CBC2', fg:'#6B5E52' },
      { id:9,  name:'Moisturizer',    emoji:'🧴', bg:'#F0CDB0', fg:'#A64830' },
      { id:10, name:'Sunscreen',      emoji:'☀️', bg:'#D4825A', fg:'#FDFCFA' },
    ];
    const ROUTINE_EMOJIS = ['🌅','🌙','🌿','💆','✨','🫧','💎','🌸','⭐','🍃','🔥','🫶'];
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getUserId() {
      let uid = localStorage.getItem('sk_uid');
      if (!uid) { uid = crypto.randomUUID(); localStorage.setItem('sk_uid', uid); }
      return uid;
    }
    const USER_ID = getUserId();

    function compressImage(file, max = 600) {
      return new Promise(res => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          let { width: w, height: h } = img;
          if (w > max || h > max) {
            if (w > h) { h = Math.round(h / w * max); w = max; }
            else { w = Math.round(w / h * max); h = max; }
          }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);
          res(c.toDataURL('image/jpeg', 0.75));
        };
        img.src = url;
      });
    }

    async function callAnalyze(b64) {
      const r = await fetch(`${WORKER_URL}/analyze`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ imageBase64: b64 }),
      });
      if (!r.ok) throw new Error(`Analyze ${r.status}`);
      return r.json();
    }

    async function callQuiz(messages, products) {
      const r = await fetch(`${WORKER_URL}/quiz`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages,
          products: products.map(p => ({ name: p.name, brand: p.brand, step_name: p.step_name, step_id: p.step_id })),
          catalogue: [],
        }),
      });
      if (!r.ok) throw new Error(`Quiz ${r.status}`);
      return r.json();
    }

    async function callChat(messages, products) {
      const r = await fetch(`${WORKER_URL}/chat`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages,
          products: products.map(p => ({ name: p.name, brand: p.brand, step_name: p.step_name, step_id: p.step_id })),
          catalogue: [],
        }),
      });
      if (!r.ok) throw new Error(`Chat ${r.status}`);
      const d = await r.json();
      return d.reply;
    }

    let toastTimer;
    function showToast(msg) {
      let el = document.getElementById('sk-toast');
      if (!el) { el = document.createElement('div'); el.id = 'sk-toast'; el.className = 'toast'; document.body.appendChild(el); }
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    // ─────────────────────────────────────────────────────────────────────
    function App() {
      const [loading, setLoading]         = useState(true);
      const [tab, setTab]                 = useState('products');
      const [products, setProducts]       = useState([]);
      const [routines, setRoutines]       = useState([]);
      const [analyzing, setAnalyzing]     = useState(false);

      // Products filters
      const [filterSteps, setFilterSteps]         = useState([]);
      const [filterIngredients, setFilterIngredients] = useState([]);
      const [filterSkinTypes, setFilterSkinTypes] = useState([]);
      const [showFilters, setShowFilters]         = useState(false);

      // Modals
      const [showAddProd, setShowAddProd]     = useState(false);
      const [selProd, setSelProd]             = useState(null);
      const [selRoutine, setSelRoutine]       = useState(null);
      const [addToRtnProd, setAddToRtnProd]   = useState(null);
      const [showCreateRtn, setShowCreateRtn] = useState(false);
      const [rtnName, setRtnName]             = useState('');
      const [rtnEmoji, setRtnEmoji]           = useState('✨');

      // Routine drag-drop
      const [dragIdx, setDragIdx]           = useState(null);
      const [dragOverIdx, setDragOverIdx]   = useState(null);

      // +Step modal filter
      const [stepModalFilter, setStepModalFilter] = useState(null);

      // Quiz state
      const [quizHistory, setQuizHistory]   = useState([]); // API messages
      const [quizUI, setQuizUI]             = useState([]);  // rendered items
      const [quizLoading, setQuizLoading]   = useState(false);
      const [quizInput, setQuizInput]       = useState('');
      const [quizChoices, setQuizChoices]   = useState([]);
      const [quizMultiple, setQuizMultiple]   = useState(false);
      const [quizSelected, setQuizSelected]   = useState([]);
      const [quizRecs, setQuizRecs]         = useState(null);
      const [addedRecs, setAddedRecs]       = useState({});
      const [addingRoutine, setAddingRoutine] = useState(false);
      const [quizStarted, setQuizStarted]   = useState(false);
      const [aesuMode, setAesuMode]           = useState('landing'); // 'landing' | 'quiz' | 'chat'
      const [chatMsgs, setChatMsgs]           = useState([]);
      const [chatInput2, setChatInput2]       = useState('');
      const [chatLoading2, setChatLoading2]   = useState(false);

      const fileRef = useRef();
      const camRef  = useRef();
      const quizEnd = useRef();

      // ── Load data ────────────────────────────────────────────────────
      useEffect(() => {
        (async () => {
          try {
            const [{ data: prods }, { data: rtns }] = await Promise.all([
              db.from('products').select('*').eq('user_id', USER_ID).order('created_at'),
              db.from('routines').select('*').eq('user_id', USER_ID).order('created_at'),
            ]);
            setProducts(prods || []);
            if (!rtns || rtns.length === 0) {
              const { data: seeds } = await db.from('routines').insert([
                { user_id: USER_ID, name: 'AM Routine', emoji: '🌅', product_ids: [], hidden_steps: [] },
                { user_id: USER_ID, name: 'PM Routine', emoji: '🌙', product_ids: [], hidden_steps: [] },
              ]).select();
              setRoutines(seeds || []);
            } else {
              setRoutines(rtns);
            }
          } catch (e) { console.error(e); }
          finally { setLoading(false); }
        })();
      }, []);

      useEffect(() => { quizEnd.current?.scrollIntoView({ behavior: 'smooth' }); }, [quizUI, quizLoading, quizChoices]);

      // ── Start quiz ───────────────────────────────────────────────────
      async function startQuiz() {
        setQuizStarted(true);
        setQuizLoading(true);
        try {
          const initMsg = [{ role: 'user', content: 'Hi, I want to find my perfect skincare routine.' }];
          const res = await callQuiz(initMsg, products);
          setQuizHistory([...initMsg, { role: 'assistant', content: JSON.stringify(res) }]);
          setQuizUI([{ type: 'bot', text: res.message }]);
          setQuizChoices(res.choices || []);
          setQuizMultiple(!!res.allow_multiple);
          setQuizSelected([]);
          if (res.phase === 'recommendation') setQuizRecs(res);
        } catch { setQuizUI([{ type: 'bot', text: 'Sorry, something went wrong. Please try again! 🙏' }]); }
        finally { setQuizLoading(false); }
      }

      async function sendQuizMessage(text) {
        if (!text.trim() || quizLoading) return;
        const userMsg = { role: 'user', content: text.trim() };
        const newHistory = [...quizHistory, userMsg];
        setQuizHistory(newHistory);
        setQuizUI(prev => [...prev, { type: 'user', text: text.trim() }]);
        setQuizChoices([]);
        setQuizSelected([]);
        setQuizInput('');
        setQuizLoading(true);
        try {
          const res = await callQuiz(newHistory, products);
          setQuizHistory(h => [...h, { role: 'assistant', content: JSON.stringify(res) }]);
          setQuizUI(prev => [...prev, { type: 'bot', text: res.message }]);
          setQuizChoices(res.choices || []);
          setQuizMultiple(!!res.allow_multiple);
          setQuizSelected([]);
          if (res.phase === 'recommendation') { setQuizRecs(res); setQuizChoices([]); }
        } catch { setQuizUI(prev => [...prev, { type: 'bot', text: 'Sorry, something went wrong 🙏' }]); }
        finally { setQuizLoading(false); }
      }

      function restartQuiz() {
        setQuizStarted(false); setAesuMode('landing'); setQuizHistory([]); setQuizUI([]);
        setQuizChoices([]); setQuizMultiple(false); setQuizSelected([]); setQuizRecs(null); setAddedRecs({});
      }

      // ── Add recommended product to collection ────────────────────────
      async function addRecProduct(recProd) {
        const step = STEPS.find(s => s.id === Number(recProd.step_id)) || STEPS[0];
        const row = {
          user_id: USER_ID,
          name: recProd.name, brand: recProd.brand,
          step_id: step.id, step_name: step.name, step_bg: step.bg, step_fg: step.fg, step_emoji: step.emoji,
          how_to_use: recProd.how_to_use || '',
          active_ingredients: recProd.active_ingredients || [],
          suitable_for: recProd.suitable_for || [],
          photo: '',
        };
        const { data, error } = await db.from('products').insert(row).select().single();
        if (error) { showToast('Error saving product'); return null; }
        setProducts(prev => [...prev, data]);
        setAddedRecs(prev => ({ ...prev, [recProd.name]: true }));
        showToast(`${recProd.name} added ✓`);
        return data;
      }

      async function addFullRoutine() {
        if (!quizRecs) return;
        setAddingRoutine(true);
        try {
          const savedProducts = [];
          for (const rp of quizRecs.products) {
            if (addedRecs[rp.name]) {
              const existing = products.find(p => p.name === rp.name);
              if (existing) savedProducts.push(existing);
            } else {
              const saved = await addRecProduct(rp);
              if (saved) savedProducts.push(saved);
            }
          }
          const { data: rtn, error } = await db.from('routines').insert({
            user_id: USER_ID,
            name: quizRecs.routine_name || 'My Aesu Routine',
            emoji: '🌸',
            product_ids: savedProducts.map(p => p.id),
          }).select().single();
          if (error) throw error;
          setRoutines(prev => [...prev, rtn]);
          showToast('Routine added ✓');
          setTab('routines');
        } catch (e) { console.error(e); showToast('Error creating routine'); }
        finally { setAddingRoutine(false); }
      }

      function startChat() {
        setAesuMode('chat');
        setChatMsgs([{ role: 'assistant', content: "Hi! I'm Dear Aesu 🌸 I'm here to help with all your skincare questions — from building a routine, to understanding ingredients, to finding the right products for your skin. What's on your mind?" }]);
      }

      async function sendChatMessage() {
        if (!chatInput2.trim() || chatLoading2) return;
        const userMsg = { role: 'user', content: chatInput2.trim() };
        const history = [...chatMsgs, userMsg];
        setChatMsgs(history);
        setChatInput2('');
        setChatLoading2(true);
        try {
          const reply = await callChat(history, products);
          setChatMsgs(h => [...h, { role: 'assistant', content: reply }]);
        } catch {
          setChatMsgs(h => [...h, { role: 'assistant', content: 'Sorry, something went wrong — please try again! 🙏' }]);
        } finally {
          setChatLoading2(false);
        }
      }

      // ── Handle file/camera ────────────────────────────────────────────
      async function handleFile(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        e.target.value = '';
        setShowAddProd(false);
        setAnalyzing(true);
        try {
          const dataUrl = await compressImage(file);
          const b64 = dataUrl.split(',')[1];
          const info = await callAnalyze(b64);
          const step = STEPS.find(s => s.id === Number(info.step_id)) || STEPS[0];
          const row = {
            user_id: USER_ID,
            name: info.name || 'Unknown Product',
            brand: info.brand || 'Unknown Brand',
            step_id: step.id, step_name: step.name, step_bg: step.bg, step_fg: step.fg, step_emoji: step.emoji,
            how_to_use: info.how_to_use || '',
            active_ingredients: Array.isArray(info.active_ingredients) ? info.active_ingredients : [],
            suitable_for: Array.isArray(info.suitable_for) ? info.suitable_for : [],
            photo: dataUrl,
          };
          const { data, error } = await db.from('products').insert(row).select().single();
          if (error) throw error;
          setProducts(prev => [...prev, data]);
          showToast('Product saved ✓');
          setSelProd(data); // ← open detail immediately
        } catch (err) { console.error(err); alert('Could not analyze this product — please try again! 🙏'); }
        finally { setAnalyzing(false); }
      }

      // ── Routine actions ───────────────────────────────────────────────
      async function addToRoutine(routineId, productId) {
        const rtn = routines.find(r => r.id === routineId);
        if (!rtn || (rtn.product_ids || []).includes(productId)) { setAddToRtnProd(null); return; }
        const newIds = [...(rtn.product_ids || []), productId];
        setRoutines(rs => rs.map(r => r.id === routineId ? { ...r, product_ids: newIds } : r));
        setAddToRtnProd(null);
        await db.from('routines').update({ product_ids: newIds }).eq('id', routineId);
        showToast('Added to routine ✓');
      }

      async function removeFromRoutine(routineId, productId) {
        const rtn = routines.find(r => r.id === routineId);
        if (!rtn) return;
        const newIds = (rtn.product_ids || []).filter(id => id !== productId);
        setRoutines(rs => rs.map(r => r.id === routineId ? { ...r, product_ids: newIds } : r));
        await db.from('routines').update({ product_ids: newIds }).eq('id', routineId);
      }

      async function hideStep(routineId, stepId) {
        const rtn = routines.find(r => r.id === routineId);
        if (!rtn) return;
        const hidden = [...new Set([...(rtn.hidden_steps || []), stepId])];
        setRoutines(rs => rs.map(r => r.id === routineId ? { ...r, hidden_steps: hidden } : r));
        await db.from('routines').update({ hidden_steps: hidden }).eq('id', routineId);
      }

      async function unhideStep(routineId, stepId) {
        const rtn = routines.find(r => r.id === routineId);
        if (!rtn) return;
        const hidden = (rtn.hidden_steps || []).filter(s => s !== stepId);
        setRoutines(rs => rs.map(r => r.id === routineId ? { ...r, hidden_steps: hidden } : r));
        await db.from('routines').update({ hidden_steps: hidden }).eq('id', routineId);
      }

      async function reorderRoutine(routineId, fromIdx, toIdx) {
        const rtn = routines.find(r => r.id === routineId);
        if (!rtn) return;
        const ids = [...(rtn.product_ids || [])];
        const [moved] = ids.splice(fromIdx, 1);
        ids.splice(toIdx, 0, moved);
        setRoutines(rs => rs.map(r => r.id === routineId ? { ...r, product_ids: ids } : r));
        await db.from('routines').update({ product_ids: ids }).eq('id', routineId);
      }

      async function createRoutine() {
        if (!rtnName.trim()) return;
        const { data, error } = await db.from('routines').insert({
          user_id: USER_ID, name: rtnName.trim(), emoji: rtnEmoji, product_ids: [],
        }).select().single();
        if (error) return;
        setRoutines(rs => [...rs, data]);
        setRtnName(''); setRtnEmoji('✨'); setShowCreateRtn(false);
      }

      async function deleteProduct(id) {
        setProducts(ps => ps.filter(p => p.id !== id));
        setSelProd(null);
        const affected = routines.filter(r => (r.product_ids || []).includes(id));
        setRoutines(rs => rs.map(r => ({ ...r, product_ids: (r.product_ids || []).filter(pid => pid !== id) })));
        await db.from('products').delete().eq('id', id);
        for (const r of affected)
          await db.from('routines').update({ product_ids: (r.product_ids || []).filter(pid => pid !== id) }).eq('id', r.id);
      }

      // ── Derived data ──────────────────────────────────────────────────
      function getRoutineProducts(rtn) {
        return (rtn.product_ids || []).map(id => products.find(p => p.id === id)).filter(Boolean);
      }

      const CURATED_INGREDIENTS = [
        { label: 'Hyaluronic Acid',         keys: ['hyaluronic','sodium hyaluronate'] },
        { label: 'Centella Asiatica (CICA)', keys: ['centella','cica','madecassoside','asiaticoside'] },
        { label: 'Ceramides',               keys: ['ceramide'] },
        { label: 'Beta-Glucan',             keys: ['beta-glucan','beta glucan'] },
        { label: 'Snail Mucin',             keys: ['snail','mucin'] },
        { label: 'Niacinamide',             keys: ['niacinamide'] },
        { label: 'Tranexamic Acid (TXA)',   keys: ['tranexamic'] },
        { label: 'Vitamin C',               keys: ['vitamin c','ascorbic','ascorbyl'] },
        { label: 'Kojic Acid',              keys: ['kojic'] },
        { label: 'Peptides',                keys: ['peptide'] },
        { label: 'Retinol / Retinal',       keys: ['retinol','retinal','retinoid'] },
        { label: 'Bakuchiol',               keys: ['bakuchiol'] },
        { label: 'Glycolic Acid (AHA)',     keys: ['glycolic'] },
        { label: 'Lactic Acid (AHA)',       keys: ['lactic'] },
        { label: 'Salicylic Acid (BHA)',    keys: ['salicylic','bha'] },
        { label: 'Gluconolactone (PHA)',    keys: ['gluconolactone','pha'] },
        { label: 'Panthenol',               keys: ['panthenol','pro-vitamin b5'] },
        { label: 'Allantoin',               keys: ['allantoin'] },
        { label: 'Green Tea',               keys: ['green tea','camellia sinensis','egcg'] },
        { label: 'Mugwort',                 keys: ['mugwort','artemisia'] },
        { label: 'Tea Tree',                keys: ['tea tree','melaleuca'] },
        { label: 'Propolis',                keys: ['propolis'] },
        { label: 'Heartleaf',               keys: ['heartleaf','houttuynia'] },
      ];
      // Only show ingredient filters that match at least one product in the collection
      const activeIngredients = CURATED_INGREDIENTS.filter(ci =>
        products.some(p => (p.active_ingredients || []).some(ing =>
          ci.keys.some(k => ing.toLowerCase().includes(k))
        ))
      );
      const allSkinTypes = [...new Set(products.flatMap(p => p.suitable_for || []))].sort();

      const filteredProducts = products.filter(p => {
        if (filterSteps.length && !filterSteps.includes(p.step_id)) return false;
        if (filterIngredients.length && !filterIngredients.some(label => {
          const ci = CURATED_INGREDIENTS.find(c => c.label === label);
          if (!ci) return false;
          return (p.active_ingredients || []).some(ing => ci.keys.some(k => ing.toLowerCase().includes(k)));
        })) return false;
        if (filterSkinTypes.length && !filterSkinTypes.some(s => (p.suitable_for || []).includes(s))) return false;
        return true;
      });

      const hasFilters = filterSteps.length || filterIngredients.length || filterSkinTypes.length;

      // ── Toggle filter helpers ─────────────────────────────────────────
      function toggleArr(arr, setArr, val) {
        setArr(arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val]);
      }

      // ══════════════════════════════════════════════════════════════════
      // RENDER — Products
      // ══════════════════════════════════════════════════════════════════
      function renderProducts() {
        return (
          <>
            <div className="row">
              <h2 className="sec-title">
                My Products <span style={{fontFamily:'Nunito',fontSize:13,color:'var(--stone)',fontWeight:400}}>({products.length})</span>
              </h2>
              <button className="btn-primary" onClick={() => setShowAddProd(true)}>＋ Add</button>
            </div>

            {/* Filter toggle */}
            {products.length > 0 && (
              <>
                <button className="filter-toggle" onClick={() => setShowFilters(v => !v)}>
                  <span style={{fontSize:14}}>{showFilters ? '▲' : '▼'}</span>
                  Filters{hasFilters ? ` (${filterSteps.length + filterIngredients.length + filterSkinTypes.length})` : null}
                  {hasFilters && (
                    <span style={{color:'var(--terra)',marginLeft:4}} onClick={e => {
                      e.stopPropagation();
                      setFilterSteps([]); setFilterIngredients([]); setFilterSkinTypes([]);
                    }}>✕ Clear</span>
                  )}
                </button>

                {showFilters && (
                  <div style={{marginBottom:14}}>
                    <div className="filter-section">
                      <span className="filter-label">By Step</span>
                      <div className="filter-wrap">
                        {STEPS.filter(s => products.some(p => p.step_id === s.id)).map(s => (
                          <button key={s.id} className={`filter-chip ${filterSteps.includes(s.id) ? 'on' : ''}`}
                            onClick={() => toggleArr(filterSteps, setFilterSteps, s.id)}>
                            {s.emoji} {s.name}
                          </button>
                        ))}
                      </div>
                    </div>
                    {allSkinTypes.length > 0 && (
                      <div className="filter-section">
                        <span className="filter-label">By Skin Type</span>
                        <div className="filter-wrap">
                          {allSkinTypes.map(st => (
                            <button key={st} className={`filter-chip ${filterSkinTypes.includes(st) ? 'on' : ''}`}
                              onClick={() => toggleArr(filterSkinTypes, setFilterSkinTypes, st)}>
                              {st}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                    {activeIngredients.length > 0 && (
                      <div className="filter-section">
                        <span className="filter-label">By Active Ingredient</span>
                        <div className="filter-wrap">
                          {activeIngredients.map(ci => (
                            <button key={ci.label} className={`filter-chip ${filterIngredients.includes(ci.label) ? 'on' : ''}`}
                              onClick={() => toggleArr(filterIngredients, setFilterIngredients, ci.label)}>
                              {ci.label}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                    <div className="filter-divider" />
                  </div>
                )}
              </>
            )}

            {filteredProducts.length === 0 ? (
              <div className="empty">
                <div className="empty-ico">🧴</div>
                <div className="empty-t">{products.length === 0 ? 'No products yet' : 'No matches'}</div>
                <div className="empty-d">
                  {products.length === 0
                    ? 'Tap "Add" to photograph a product —\nClaude will identify everything!'
                    : 'Try adjusting your filters.'}
                </div>
              </div>
            ) : (
              <div className="p-grid">
                {filteredProducts.map(p => (
                  <div className="p-card" key={p.id} onClick={() => setSelProd(p)}>
                    <div className="p-photo">
                      {p.photo ? <img src={p.photo} alt={p.name} /> : <span>{p.step_emoji}</span>}
                    </div>
                    <div className="p-body">
                      <div className="p-brand">{p.brand}</div>
                      <div className="p-name">{p.name}</div>
                      <div className="p-foot">
                        <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>
                          {p.step_emoji} {p.step_name}
                        </span>
                        <button className="add-circ" onClick={e => { e.stopPropagation(); setAddToRtnProd(p); }}>＋</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </>
        );
      }

      // ══════════════════════════════════════════════════════════════════
      // RENDER — Routines
      // ══════════════════════════════════════════════════════════════════
      function renderRoutines() {
        if (selRoutine) {
          const rtn = routines.find(r => r.id === selRoutine);
          if (!rtn) { setSelRoutine(null); return null; }
          const rtnProds = getRoutineProducts(rtn);
          const presentStepIds = new Set(rtnProds.map(p => p.step_id));

          return (
            <>
              <div className="row">
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <button className="back-btn" onClick={() => setSelRoutine(null)}>←</button>
                  <h2 className="sec-title">{rtn.emoji} {rtn.name}</h2>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  {(rtn.hidden_steps||[]).length > 0 && (
                    <button className="btn-ghost" style={{fontSize:12,color:'var(--stone)',fontWeight:600}}
                      title="Restore hidden steps"
                      onClick={() => {
                        (rtn.hidden_steps||[]).forEach(sid => unhideStep(rtn.id, sid));
                      }}>
                      Show all
                    </button>
                  )}
                  <button className="btn-outline" onClick={() => setAddToRtnProd({ _rtnId: rtn.id })}>＋ Step</button>
                </div>
              </div>

              {STEPS.map(step => {
                const prod = rtnProds.find(p => p.step_id === step.id);
                const idx  = rtnProds.indexOf(prod);

                if (prod) {
                  return (
                    <div key={step.id}
                      className={`step-row ${dragIdx === idx ? 'dragging' : ''} ${dragOverIdx === idx && dragIdx !== idx ? 'drag-over' : ''}`}
                      draggable
                      onDragStart={() => setDragIdx(idx)}
                      onDragOver={e => { e.preventDefault(); setDragOverIdx(idx); }}
                      onDrop={() => {
                        if (dragIdx !== null && dragIdx !== idx) reorderRoutine(rtn.id, dragIdx, idx);
                        setDragIdx(null); setDragOverIdx(null);
                      }}
                      onDragEnd={() => { setDragIdx(null); setDragOverIdx(null); }}
                    >
                      <span className="drag-handle">⠿</span>
                      <div className="step-num-label">
                        <div className="step-num">{step.id}</div>
                        <div className="step-name-sm">{step.name}</div>
                      </div>
                      <div className="step-ph">
                        {prod.photo ? <img src={prod.photo} alt={prod.name} /> : <span>{step.emoji}</span>}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:10,color:'var(--terra)',fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase'}}>{prod.brand}</div>
                        <div style={{fontSize:13.5,fontWeight:600,lineHeight:1.3,marginBottom:4}}>{prod.name}</div>
                        <span className="badge" style={{background:prod.step_bg,color:prod.step_fg}}>{step.emoji} {step.name}</span>
                      </div>
                      <button className="btn-ghost" onClick={() => removeFromRoutine(rtn.id, prod.id)}>✕</button>
                    </div>
                  );
                } else {
                  const isHidden = (rtn.hidden_steps || []).includes(step.id);
                  if (isHidden) return null;
                  return (
                    <div key={step.id} className="step-ghost">
                      <div className="step-num-label">
                        <div className="step-num" style={{background:'var(--cream)',color:'var(--stone)'}}>{step.id}</div>
                        <div className="step-name-sm" style={{color:'var(--silver)'}}>{step.name}</div>
                      </div>
                      <button className="step-ghost-btn"
                        onClick={() => setAddToRtnProd({ _rtnId: rtn.id, _stepFilter: step.id })}>
                        <span style={{fontSize:16}}>{step.emoji}</span>
                        Add {step.name}
                      </button>
                      <button className="btn-ghost" title="Hide this step"
                        onClick={() => hideStep(rtn.id, step.id)}
                        style={{fontSize:14,color:'var(--silver)',flexShrink:0}}>✕</button>
                    </div>
                  );
                }
              })}
            </>
          );
        }

        return (
          <>
            <div className="row">
              <h2 className="sec-title">My Routines</h2>
              <button className="btn-primary" onClick={() => setShowCreateRtn(true)}>＋ New</button>
            </div>
            {routines.map(r => {
              const cnt = (r.product_ids || []).filter(id => products.find(p => p.id === id)).length;
              return (
                <div className="r-card" key={r.id} onClick={() => setSelRoutine(r.id)}>
                  <div className="r-em">{r.emoji}</div>
                  <div style={{flex:1}}>
                    <div className="r-name">{r.name}</div>
                    <div className="r-cnt">{cnt === 0 ? 'No steps yet' : `${cnt} step${cnt !== 1 ? 's' : ''}`}</div>
                  </div>
                  <span style={{color:'var(--silver)',fontSize:20}}>›</span>
                </div>
              );
            })}
          </>
        );
      }

      // ══════════════════════════════════════════════════════════════════
      // RENDER — Dear Aesu quiz
      // ══════════════════════════════════════════════════════════════════
      function renderAesu() {
        const subtitle = aesuMode === 'chat' ? '● Skincare Advisor' : '● Skin Assessment';
        const showBack = aesuMode !== 'landing';
        return (
          <div className="quiz-wrap">
            <div className="quiz-hdr">
              <div className="aesu-av">🌸</div>
              <div style={{flex:1}}>
                <div className="aesu-nm">Dear Aesu</div>
                <div className="aesu-st">{subtitle}</div>
              </div>
              {showBack && (
                <button className="quiz-restart" onClick={() => {
                  setAesuMode('landing');
                  setQuizStarted(false); setQuizHistory([]); setQuizUI([]);
                  setQuizChoices([]); setQuizMultiple(false); setQuizSelected([]); setQuizRecs(null); setAddedRecs({});
                  setChatMsgs([]); setChatInput2('');
                }}>← Back</button>
              )}
            </div>

            {aesuMode === 'landing' ? (
              <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'32px 28px',textAlign:'center',gap:16}}>
                <div style={{fontSize:52}}>🌸</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:500,color:'var(--espresso)'}}>
                  Dear Aesu
                </div>
                <div style={{fontSize:13.5,color:'var(--taupe)',lineHeight:1.7,maxWidth:300,marginBottom:8}}>
                  Your personal K-beauty advisor — here to help you glow.
                </div>
                <button className="btn-primary" style={{width:260,justifyContent:'center',padding:'12px 24px',fontSize:14}}
                  onClick={() => { setAesuMode('quiz'); setQuizStarted(false); startQuiz(); }}>
                  ✦ Start skin assessment
                </button>
                <button className="btn-outline" style={{width:260,justifyContent:'center',padding:'11px 24px',fontSize:14}}
                  onClick={startChat}>
                  💬 Get skincare advice
                </button>
                <div style={{fontSize:11.5,color:'var(--silver)',marginTop:4,lineHeight:1.6,maxWidth:260}}>
                  Assessment gives you a full personalised routine.<br/>Advice is a free chat with Aesu about anything skincare.
                </div>
              </div>
            ) : aesuMode === 'chat' ? (
              <>
                <div className="quiz-msgs">
                  {chatMsgs.map((m, i) => (
                    <div key={i} className={`qmsg ${m.role === 'user' ? 'u' : ''}`}>
                      <div className="qav">{m.role === 'user' ? '🌿' : '🌸'}</div>
                      <div className="qbubble">{m.content}</div>
                    </div>
                  ))}
                  {chatLoading2 && (
                    <div className="qmsg">
                      <div className="qav">🌸</div>
                      <div className="qbubble"><div className="dots"><span/><span/><span/></div></div>
                    </div>
                  )}
                  <div ref={quizEnd} />
                </div>
                <div className="quiz-inp-area">
                  <textarea className="quiz-inp" value={chatInput2}
                    onChange={e => setChatInput2(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); } }}
                    placeholder="Ask Aesu anything about skincare…" rows={1} />
                  <button className="quiz-send" onClick={sendChatMessage}
                    disabled={chatLoading2 || !chatInput2.trim()}>↑</button>
                </div>
              </>
            ) : (
              <>
                <div className="quiz-msgs">
                  {quizUI.map((item, i) => (
                    <div key={i} className={`qmsg ${item.type === 'user' ? 'u' : ''}`}>
                      <div className="qav">{item.type === 'user' ? '🌿' : '🌸'}</div>
                      <div className="qbubble">{item.text}</div>
                    </div>
                  ))}
                  {quizLoading && (
                    <div className="qmsg">
                      <div className="qav">🌸</div>
                      <div className="qbubble"><div className="dots"><span/><span/><span/></div></div>
                    </div>
                  )}
                  <div ref={quizEnd} />
                </div>

                {/* Choices */}
                {!quizLoading && quizChoices.length > 0 && !quizRecs && (
                  <div>
                    <div className="quiz-choices">
                      {quizChoices.map((c, i) => {
                        const isSel = quizSelected.includes(c);
                        return (
                          <button key={i}
                            className={`q-choice ${isSel ? 'sel' : ''}`}
                            onClick={() => {
                              if (!quizMultiple) {
                                sendQuizMessage(c);
                              } else {
                                setQuizSelected(prev =>
                                  prev.includes(c) ? prev.filter(v => v !== c) : [...prev, c]
                                );
                              }
                            }}>
                            {quizMultiple && <span style={{marginRight:5}}>{isSel ? '✓' : '+'}</span>}
                            {c}
                          </button>
                        );
                      })}
                    </div>
                    {quizMultiple && quizSelected.length > 0 && (
                      <button className="q-confirm"
                        onClick={() => sendQuizMessage(quizSelected.join(', '))}>
                        Confirm ({quizSelected.length} selected) →
                      </button>
                    )}
                  </div>
                )}

                {/* Recommendations */}
                {quizRecs && !quizLoading && (
                  <div className="rec-section" style={{overflowY:'auto',flexShrink:0,maxHeight:'55dvh'}}>
                    <div className="rec-title">{quizRecs.routine_name}</div>
                    <div className="rec-profile">{quizRecs.skin_profile}</div>
                    {(quizRecs.products || []).map((rp, i) => {
                      const step = STEPS.find(s => s.id === Number(rp.step_id)) || STEPS[0];
                      const isAdded = !!addedRecs[rp.name];
                      return (
                        <div key={i} className="rec-card">
                          <div className="rec-ph"><span>{step.emoji}</span></div>
                          <div className="rec-body">
                            <div className="rec-brand">{rp.brand}</div>
                            <div className="rec-name">{rp.name}</div>
                            <span className="badge" style={{background:step.bg,color:step.fg,marginBottom:4}}>{step.emoji} {step.name}</span>
                            <div className="rec-reason">{rp.reason}</div>
                          </div>
                          <button className={`rec-add ${isAdded ? 'added' : ''}`}
                            disabled={isAdded} onClick={() => !isAdded && addRecProduct(rp)}
                            title={isAdded ? 'Added' : 'Add to my products'}>
                            {isAdded ? '✓' : '＋'}
                          </button>
                        </div>
                      );
                    })}
                    <div className="rec-actions">
                      <button className="btn-primary" style={{flex:1,justifyContent:'center'}}
                        onClick={addFullRoutine} disabled={addingRoutine}>
                        {addingRoutine ? 'Adding…' : '＋ Add full routine'}
                      </button>
                      <button className="btn-outline" onClick={restartQuiz}>Start over</button>
                    </div>
                  </div>
                )}

                {/* Input */}
                {!quizRecs && (
                  <div className="quiz-inp-area">
                    <textarea className="quiz-inp" value={quizInput}
                      onChange={e => setQuizInput(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuizMessage(quizInput); } }}
                      placeholder="Or type your answer…" rows={1} />
                    <button className="quiz-send" onClick={() => sendQuizMessage(quizInput)}
                      disabled={quizLoading || !quizInput.trim()}>↑</button>
                  </div>
                )}
              </>
            )}
          </div>
        );
      }

      // ══════════════════════════════════════════════════════════════════
      // MODALS
      // ══════════════════════════════════════════════════════════════════
      function modalAddProduct() {
        return (
          <div className="overlay" onClick={() => setShowAddProd(false)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="sheet-pad">
                <div className="m-title">Add Product</div>
                <div className="add-opts">
                  <div className="add-opt" onClick={() => camRef.current?.click()}>
                    <div className="add-opt-ico">📸</div>
                    <div className="add-opt-lbl">Take Photo</div>
                  </div>
                  <div className="add-opt" onClick={() => fileRef.current?.click()}>
                    <div className="add-opt-ico">🖼️</div>
                    <div className="add-opt-lbl">Upload Image</div>
                  </div>
                </div>
                <p style={{marginTop:18,fontSize:12,color:'var(--stone)',textAlign:'center',lineHeight:1.7}}>
                  Claude will auto-detect the product name, K-beauty step, ingredients & usage ✨
                </p>
              </div>
            </div>
          </div>
        );
      }

      function modalProductDetail() {
        const p = selProd;
        return (
          <div className="overlay" onClick={() => setSelProd(null)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="det-photo">
                {p.photo ? <img src={p.photo} alt={p.name} /> : <span>{p.step_emoji}</span>}
              </div>
              <div className="sheet-pad" style={{paddingTop:20}}>
                <div className="det-brand">{p.brand}</div>
                <div className="det-name">{p.name}</div>
                <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>
                  Step {p.step_id} · {p.step_emoji} {p.step_name}
                </span>
                <span className="sec-lbl">How to Use</span>
                <div className="sec-txt">{p.how_to_use || '—'}</div>
                <span className="sec-lbl">Key Actives</span>
                <div className="tags">
                  {(p.active_ingredients || []).length
                    ? (p.active_ingredients || []).map((ing, i) => <span key={i} className="tag">{ing}</span>)
                    : <span className="tag">—</span>}
                </div>
                <span className="sec-lbl">Suitable For</span>
                <div className="tags">
                  {(p.suitable_for || []).length
                    ? (p.suitable_for || []).map((s, i) => <span key={i} className="tag green">{s}</span>)
                    : <span className="tag">—</span>}
                </div>
                <div style={{display:'flex',gap:10,marginTop:24,marginBottom:4}}>
                  <button className="btn-primary" style={{flex:1,justifyContent:'center'}}
                    onClick={() => { setAddToRtnProd(p); setSelProd(null); }}>
                    Add to Routine
                  </button>
                  <button className="btn-outline btn-danger" onClick={() => deleteProduct(p.id)}>Delete</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function modalAddToRoutine() {
        const isFromRtn = !!addToRtnProd._rtnId;
        const rtnId     = isFromRtn ? addToRtnProd._rtnId : null;
        const stepFilter = addToRtnProd._stepFilter || stepModalFilter;
        const currentIds = isFromRtn ? (routines.find(r => r.id === rtnId)?.product_ids || []) : [];
        const available = products.filter(p => !currentIds.includes(p.id));
        const filtered  = stepFilter ? available.filter(p => p.step_id === stepFilter) : available;

        return (
          <div className="overlay" onClick={() => { setAddToRtnProd(null); setStepModalFilter(null); }}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="sheet-pad">
                {isFromRtn ? (
                  <>
                    <div className="m-title">Add a step</div>
                    {/* Step filter chips */}
                    {available.length > 0 && (
                      <div className="chips" style={{marginBottom:16}}>
                        <button className={`chip ${!stepFilter ? 'on' : ''}`} onClick={() => setStepModalFilter(null)}>All</button>
                        {STEPS.filter(s => available.some(p => p.step_id === s.id)).map(s => (
                          <button key={s.id} className={`chip ${stepFilter === s.id ? 'on' : ''}`}
                            onClick={() => setStepModalFilter(stepFilter === s.id ? null : s.id)}>
                            {s.emoji} {s.name}
                          </button>
                        ))}
                      </div>
                    )}
                    {filtered.length === 0
                      ? <p style={{color:'var(--stone)',fontSize:13}}>
                          {available.length === 0
                            ? 'All products are already in this routine!'
                            : 'No products in this category yet.'}
                        </p>
                      : filtered.map(p => (
                          <div key={p.id} className="p-list-row" onClick={() => { addToRoutine(rtnId, p.id); setStepModalFilter(null); }}>
                            <div className="p-list-ph">{p.photo ? <img src={p.photo} alt={p.name} /> : <span>{p.step_emoji}</span>}</div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:600}}>{p.name}</div>
                              <div style={{fontSize:11,color:'var(--terra)'}}>{p.brand}</div>
                            </div>
                            <span className="badge" style={{background:p.step_bg,color:p.step_fg}}>{p.step_emoji} {p.step_name}</span>
                          </div>
                        ))}
                  </>
                ) : (
                  <>
                    <div className="m-title">Add to Routine</div>
                    <p style={{fontSize:13,color:'var(--taupe)',marginBottom:16}}>
                      Where should <strong>{addToRtnProd.name}</strong> go?
                    </p>
                    {routines.map(r => (
                      <div key={r.id} className="r-card" style={{marginBottom:10}} onClick={() => addToRoutine(r.id, addToRtnProd.id)}>
                        <div className="r-em" style={{fontSize:24}}>{r.emoji}</div>
                        <div style={{flex:1}}>
                          <div className="r-name">{r.name}</div>
                          <div className="r-cnt">{(r.product_ids||[]).filter(id=>products.find(p=>p.id===id)).length} products</div>
                        </div>
                        <span style={{color:'var(--terra)',fontSize:20}}>＋</span>
                      </div>
                    ))}
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      function modalCreateRoutine() {
        return (
          <div className="overlay" onClick={() => setShowCreateRtn(false)}>
            <div className="sheet" onClick={e => e.stopPropagation()}>
              <div className="handle" />
              <div className="sheet-pad">
                <div className="m-title">New Routine</div>
                <span className="lbl">Emoji</span>
                <div className="em-pick">
                  {ROUTINE_EMOJIS.map(em => (
                    <button key={em} className={`em-btn ${rtnEmoji === em ? 'on' : ''}`} onClick={() => setRtnEmoji(em)}>{em}</button>
                  ))}
                </div>
                <span className="lbl">Name</span>
                <input className="inp" placeholder="e.g. Anti-aging PM Routine"
                  value={rtnName} onChange={e => setRtnName(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && createRoutine()} autoFocus />
                <div style={{display:'flex',gap:10,marginTop:22}}>
                  <button className="btn-primary" style={{flex:1,justifyContent:'center'}} onClick={createRoutine}>Create</button>
                  <button className="btn-outline" onClick={() => setShowCreateRtn(false)}>Cancel</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ══════════════════════════════════════════════════════════════════
      // MAIN RENDER
      // ══════════════════════════════════════════════════════════════════
      if (loading) return null;

      return (
        <div className="sk-app">
          <div className="sk-header">
            <div className="sk-eyebrow">✦ Aesu ✦</div>
            <div className="sk-title">My Korean Skincare</div>
            <div className="sk-tabs">
              {[['products','Products'],['routines','Routines'],['aesu','Dear Aesu']].map(([id,lbl]) => (
                <button key={id} className={`sk-tab ${tab===id?'on':''}`} onClick={() => setTab(id)}>{lbl}</button>
              ))}
            </div>
          </div>

          {tab === 'aesu' ? renderAesu() : (
            <div className="sk-content">
              {tab === 'products' && renderProducts()}
              {tab === 'routines' && renderRoutines()}
            </div>
          )}

          <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} />
          <input ref={camRef}  type="file" accept="image/*" capture="environment" onChange={handleFile} />

          {analyzing && (
            <div className="spin-over">
              <div className="spin" />
              <div className="spin-t">Analyzing your product…</div>
              <div className="spin-s">Claude is identifying category & ingredients ✨</div>
            </div>
          )}
          {addingRoutine && (
            <div className="spin-over">
              <div className="spin" />
              <div className="spin-t">Building your routine…</div>
              <div className="spin-s">Saving all products & creating routine ✨</div>
            </div>
          )}

          {showAddProd   && modalAddProduct()}
          {selProd       && modalProductDetail()}
          {addToRtnProd  && modalAddToRoutine()}
          {showCreateRtn && modalCreateRoutine()}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
